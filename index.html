<!DOCTYPE html>
<!-- SCOSF Dashboard v4.0 — 2026-05-02 -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0e1a">
<title>SCOSF — Card Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0a0e1a;
    --navy2: #111827;
    --navy3: #1a2235;
    --border: #1e2d45;
    --blue: #2563eb;
    --blue-glow: rgba(37,99,235,0.3);
    --teal: #0891b2;
    --green: #059669;
    --green-light: #d1fae5;
    --green-text: #10b981;
    --amber: #d97706;
    --amber-light: #fef3c7;
    --red: #dc2626;
    --red-light: #fee2e2;
    --blue-light: #dbeafe;
    --gray: #b0bfcc;
    --gray2: #7d93ab;
    --white: #f8fafc;
    --font-display: 'Bebas Neue', sans-serif;
    --font-body: 'DM Sans', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--navy);
    color: var(--white);
    font-family: var(--font-body);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── BACKGROUND TEXTURE ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 20% 0%, rgba(37,99,235,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 100%, rgba(8,145,178,0.06) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── HEADER ── */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,14,26,0.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
  }

  .header-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    max-width: 480px;
    margin: 0 auto;
  }

  .logo {
    font-family: var(--font-display);
    font-size: 26px;
    letter-spacing: 2px;
    color: var(--white);
    line-height: 1;
  }

  .logo span { color: var(--blue); }
  .version-badge { font-size: 9px; color: var(--gray2); margin-left: 6px; opacity: 0.6; }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .source-indicator {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-family: var(--font-mono);
    color: var(--gray2);
    cursor: pointer;
  }

  .source-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--green-text);
    animation: pulse-dot 2s infinite;
  }

  .source-dot.warning { background: var(--amber); }
  .source-dot.error { background: var(--red); }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .refresh-btn {
    background: none;
    border: none;
    color: var(--gray);
    cursor: pointer;
    padding: 6px;
    border-radius: 8px;
    transition: color 0.2s, background 0.2s;
    font-size: 16px;
  }

  .refresh-btn:hover { color: var(--white); background: var(--navy3); }
  .refresh-btn.spinning { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── SPORT TABS ── */
  .sport-tabs {
    display: flex;
    gap: 0;
    padding: 12px 16px 0;
    max-width: 480px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  .sport-tab {
    flex: 1;
    padding: 10px 8px;
    text-align: center;
    font-family: var(--font-display);
    font-size: 18px;
    letter-spacing: 1.5px;
    color: var(--gray2);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    position: relative;
  }

  .sport-tab.active {
    color: var(--white);
    border-bottom-color: var(--blue);
  }

  .sport-tab .badge {
    position: absolute;
    top: 4px;
    right: 8px;
    background: var(--green-text);
    color: var(--navy);
    font-family: var(--font-mono);
    font-size: 9px;
    font-weight: 500;
    padding: 1px 4px;
    border-radius: 4px;
    line-height: 1.4;
  }

  /* ── TIMEFRAME SELECTOR ── */
  .timeframe-bar {
    padding: 12px 16px;
    max-width: 480px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  .timeframe-scroll {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }

  .timeframe-scroll::-webkit-scrollbar { display: none; }

  .tf-btn {
    flex-shrink: 0;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--navy2);
    color: var(--gray);
    font-family: var(--font-mono);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .tf-btn.active {
    background: var(--blue);
    border-color: var(--blue);
    color: var(--white);
  }

  /* ── SUMMARY CARDS ── */
  .summary-strip {
    display: flex;
    gap: 8px;
    padding: 0 16px 12px;
    max-width: 480px;
    margin: 0 auto;
    overflow-x: auto;
    scrollbar-width: none;
    position: relative;
    z-index: 1;
  }

  .summary-strip::-webkit-scrollbar { display: none; }

  .summary-card {
    flex-shrink: 0;
    background: var(--navy2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    min-width: 90px;
    text-align: center;
  }

  .summary-card .sc-value {
    font-family: var(--font-display);
    font-size: 28px;
    line-height: 1;
    margin-bottom: 3px;
  }

  .summary-card .sc-label {
    font-size: 10px;
    font-family: var(--font-mono);
    color: var(--gray2);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .summary-card.strong-buy .sc-value { color: var(--green-text); }
  .summary-card.buy-candidate .sc-value { color: var(--blue); }
  .summary-card.watchlist .sc-value { color: var(--amber); }
  .summary-card.total .sc-value { color: var(--white); }

  /* ── PLAYER LIST ── */
  .list-container {
    padding: 0 16px 100px;
    max-width: 480px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  .list-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .list-title {
    font-family: var(--font-display);
    font-size: 20px;
    letter-spacing: 1px;
    color: var(--gray);
  }

  .list-count {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--gray2);
  }

  /* ── PLAYER CARD ── */
  .player-card {
    background: var(--navy2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .player-card::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    border-radius: 3px 0 0 3px;
  }

  .player-card.strong-buy::before { background: var(--green-text); }
  .player-card.buy-candidate::before { background: var(--blue); }
  .player-card.watchlist::before { background: var(--amber); }
  .player-card.monitor::before { background: var(--border); }

  .player-card:active { transform: scale(0.98); }

  .player-card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .player-left {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
    min-width: 0;
  }

  .rank-badge {
    font-family: var(--font-display);
    font-size: 22px;
    color: var(--gray2);
    min-width: 28px;
    line-height: 1;
  }

  .player-info { min-width: 0; flex: 1; }

  .player-name {
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 15px;
    color: var(--white);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 3px;
  }

  .player-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }

  .player-team {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--gray2);
  }

  .player-pos {
    font-family: var(--font-mono);
    font-size: 10px;
    background: var(--navy3);
    color: var(--gray);
    padding: 1px 6px;
    border-radius: 4px;
  }

  .tier-pill {
    font-family: var(--font-mono);
    font-size: 9px;
    font-weight: 500;
    padding: 2px 7px;
    border-radius: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .tier-pill { border-radius: 20px; font-weight: 500; display: inline-flex; align-items: center; gap: 3px; }
  .tier-pill.strong-buy { background: rgba(16,185,129,0.18); color: #34d399; border: 1px solid rgba(52,211,153,0.4); }
  .tier-pill.buy-candidate { background: rgba(59,130,246,0.18); color: #93c5fd; border: 1px solid rgba(147,197,253,0.4); }
  .tier-pill.watchlist { background: rgba(245,158,11,0.18); color: #fcd34d; border: 1px solid rgba(252,211,77,0.4); }
  .tier-pill.monitor { background: rgba(100,116,139,0.12); color: #94a3b8; border: 1px solid rgba(100,116,139,0.25); }

  .player-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
    margin-left: 8px;
  }

  .score-display {
    font-family: var(--font-display);
    font-size: 32px;
    line-height: 1;
    color: var(--white);
  }

  .score-display.strong-buy { color: var(--green-text); }
  .score-display.buy-candidate { color: #60a5fa; }
  .score-display.watchlist { color: #fbbf24; }

  .rank-change {
    display: flex;
    align-items: center;
    gap: 3px;
    font-family: var(--font-mono);
    font-size: 11px;
  }

  .rank-change.up { color: var(--green-text); }
  .rank-change.down { color: var(--red); }
  .rank-change.flat { color: var(--gray2); }

  /* ── SPARKLINE ── */
  .sparkline-container {
    height: 36px;
    margin-top: 4px;
    position: relative;
  }

  .sparkline-container canvas {
    width: 100%;
    height: 100%;
  }

  /* ── SIGNAL BARS ── */
  .signal-bars {
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-top: 10px;
  }

  .signal-bar-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .signal-bar-label {
    font-size: 10px;
    color: var(--gray2);
    width: 18px;
    flex-shrink: 0;
  }

  .signal-bar-track {
    flex: 1;
    height: 5px;
    background: rgba(100,116,139,0.15);
    border-radius: 3px;
    overflow: hidden;
  }

  .signal-bar {
    height: 100%;
    border-radius: 3px;
    transition: width 0.4s ease;
  }

  .signal-bar-value {
    font-size: 10px;
    color: var(--gray2);
    width: 14px;
    text-align: right;
    flex-shrink: 0;
  }

  .signal-label {
    display: none;
  }

  /* ── EXPANDED PLAYER DETAIL ── */
  .player-detail {
    display: none;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }

  .player-detail.open { display: block; }

  .detail-signals {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-bottom: 12px;
  }

  .signal-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-radius: 8px;
    padding: 7px 10px;
  }

  .signal-name {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--gray);
  }

  .signal-score {
    font-family: var(--font-display);
    font-size: 18px;
    color: var(--white);
  }

  .signal-score.high { color: var(--green-text); }
  .signal-score.mid { color: #fbbf24; }
  .signal-score.low { color: var(--gray2); }

  /* ── BRIEF BUTTON ── */
  .brief-btn {
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    width: 100%;
    padding: 10px;
    background: linear-gradient(135deg, rgba(37,99,235,0.2), rgba(8,145,178,0.2));
    border: 1px solid rgba(37,99,235,0.4);
    border-radius: 8px;
    color: #60a5fa;
    font-family: var(--font-body);
    font-weight: 500;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
  }

  .brief-btn:hover {
    background: linear-gradient(135deg, rgba(37,99,235,0.35), rgba(8,145,178,0.35));
    border-color: rgba(37,99,235,0.7);
  }

  .brief-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .brief-btn .btn-icon { font-size: 14px; }

  /* ── BRIEF OUTPUT ── */
  .brief-output { display: none; }

  /* ── BRIEF MODAL ── */
  .brief-modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.75);
    z-index: 1000;
    padding: 20px;
    overflow-y: auto;
  }
  .brief-modal-overlay.visible { display: flex; align-items: flex-start; justify-content: center; }
  .brief-modal {
    background: var(--navy2);
    border: 1px solid var(--border);
    border-radius: 14px;
    width: 100%;
    max-width: 640px;
    margin: 20px auto;
    overflow: hidden;
  }
  .brief-modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    background: var(--navy3);
    border-bottom: 1px solid var(--border);
  }
  .brief-modal-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--white);
  }
  .brief-modal-meta {
    font-size: 11px;
    color: var(--gray2);
    margin-top: 2px;
  }
  .brief-modal-close {
    background: none;
    border: none;
    color: var(--gray2);
    font-size: 22px;
    cursor: pointer;
    padding: 0 4px;
    line-height: 1;
  }
  .brief-modal-close:hover { color: var(--white); }
  .brief-modal-body {
    padding: 20px;
    font-size: 13px;
    line-height: 1.7;
    color: var(--gray);
    white-space: pre-wrap;
    max-height: 70vh;
    overflow-y: auto;
  }
  .brief-modal-body strong, .brief-modal-body b { color: var(--white); }

  /* ── LOADING STATE ── */
  .loading-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,14,26,0.85);
    z-index: 200;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
  }

  .loading-overlay.visible { display: flex; }

  .loader {
    width: 40px;
    height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  .loading-text {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--gray);
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--gray2);
  }

  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-title { font-family: var(--font-display); font-size: 22px; margin-bottom: 8px; color: var(--gray); }
  .empty-text { font-size: 13px; line-height: 1.6; }

  /* ── SOURCE HEALTH MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,14,26,0.9);
    z-index: 150;
    align-items: flex-end;
    justify-content: center;
    padding: 0;
  }

  .modal-overlay.visible { display: flex; }

  .modal {
    background: var(--navy2);
    border: 1px solid var(--border);
    border-radius: 20px 20px 0 0;
    padding: 20px 16px 40px;
    width: 100%;
    max-width: 480px;
    max-height: 80vh;
    overflow-y: auto;
    animation: slideUp 0.3s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .modal-title {
    font-family: var(--font-display);
    font-size: 22px;
    letter-spacing: 1px;
  }

  .modal-close {
    background: var(--navy3);
    border: none;
    color: var(--gray);
    width: 32px;
    height: 32px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .source-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    background: var(--navy3);
    border-radius: 8px;
    margin-bottom: 6px;
  }

  .source-item-left { flex: 1; min-width: 0; }

  .source-item-name {
    font-weight: 500;
    font-size: 13px;
    margin-bottom: 2px;
  }

  .source-item-signal {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--gray2);
  }

  .source-status-badge {
    font-family: var(--font-mono);
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 8px;
    font-weight: 500;
  }

  .source-status-badge.active { background: rgba(16,185,129,0.15); color: var(--green-text); }
  .source-status-badge.backup { background: rgba(217,119,6,0.15); color: #fbbf24; }
  .source-status-badge.down { background: rgba(220,38,38,0.15); color: #f87171; }
  .source-status-badge.standby { background: rgba(100,116,139,0.1); color: var(--gray2); }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(10,14,26,0.95);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    display: flex;
    z-index: 100;
  }

  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 8px 14px;
    cursor: pointer;
    transition: color 0.2s;
    color: var(--gray2);
    border: none;
    background: none;
  }

  .nav-item.active { color: var(--blue); }
  .nav-icon { font-size: 20px; margin-bottom: 3px; }
  .nav-label { font-family: var(--font-mono); font-size: 9px; text-transform: uppercase; letter-spacing: 0.5px; }

  /* ── ERROR TOAST ── */
  .toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--navy3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 16px;
    font-size: 13px;
    color: var(--gray);
    opacity: 0;
    transition: all 0.3s;
    z-index: 300;
    white-space: nowrap;
    pointer-events: none;
  }

  .toast.visible {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .toast.error { border-color: rgba(220,38,38,0.4); color: #f87171; }
  .toast.success { border-color: rgba(16,185,129,0.4); color: var(--green-text); }

  /* ── LAST UPDATED ── */
  .last-updated {
    text-align: center;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--gray2);
    padding: 8px 0 4px;
    position: relative;
    z-index: 1;
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<!-- Loading Overlay -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loader"></div>
  <div class="loading-text" id="loadingText">Loading intelligence...</div>
</div>

<!-- Source Health Modal -->
<div class="modal-overlay" id="sourceModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">SOURCE HEALTH</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="sourceList"></div>
  </div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────
const API_URL = 'https://script.google.com/macros/s/AKfycbxbJfBx6Wd4rbAJFQTmRx11YNHAL8LxI3EKp6mKSLwhh9pAF_tMqFFthhuamqlLkLKl/exec';
const ANTHROPIC_API_URL = 'https://api.anthropic.com/v1/messages';

// ── STATE ─────────────────────────────────────────────────────────────────
let state = {
  sport: 'NFL',
  timeframe: 7,
  view: 'rankings',
  data: { NFL: null, MLB: null, NBA: null },
  history: {},
  sources: null,
  summary: null,
  expandedPlayer: null,
  loading: false
};

// ── INIT ──────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  loadData(false);
});

// ── DATA LOADING ──────────────────────────────────────────────────────────
async function loadData(showLoader = true) {
  if (state.loading) return;
  state.loading = true;

  const refreshBtn = document.getElementById('refreshBtn');
  refreshBtn.classList.add('spinning');

  if (showLoader) showLoading('Fetching latest scores...');

  try {
    // Load summary and current sport in parallel
    const [summaryRes, playersRes] = await Promise.all([
      fetchAPI('getDashboardSummary'),
      fetchAPI('getTopPlayers', { sport: state.sport, limit: 20 })
    ]);

    state.summary = summaryRes;
    state.data[state.sport] = playersRes.players || [];

    // Load other sports in background
    loadOtherSports();

    // Load source health
    fetchAPI('getSourceHealth').then(res => {
      state.sources = res;
      updateSourceIndicator();
      if (state.sport) renderSourceModal();
    });

    updateSummaryStrip();
    updateBadges();
    renderPlayerList();
    updateLastUpdated();

  } catch(err) {
    showToast('Failed to load data. Check connection.', 'error');
    renderError();
  } finally {
    state.loading = false;
    refreshBtn.classList.remove('spinning');
    hideLoading();
  }
}

async function loadOtherSports() {
  const others = ['NFL', 'MLB', 'NBA'].filter(s => s !== state.sport);
  for (const sport of others) {
    try {
      const res = await fetchAPI('getTopPlayers', { sport, limit: 20 });
      state.data[sport] = res.players || [];
      updateBadges();
    } catch(e) {}
  }
}

async function fetchAPI(action, params = {}) {
  const url = new URL(API_URL);
  url.searchParams.set('action', action);
  Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));

  const res = await fetch(url.toString(), {
    method: 'GET',
    redirect: 'follow',
  });
  if (!res.ok) throw new Error('API error: ' + res.status);
  return await res.json();
}

async function switchSport(sport) {
  state.sport = sport;
  state.expandedPlayer = null;

  // Update tabs
  document.querySelectorAll('.sport-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + sport).classList.add('active');

  if (!state.data[sport]) {
    showLoading('Loading ' + sport + ' players...');
    try {
      const res = await fetchAPI('getTopPlayers', { sport, limit: 20 });
      state.data[sport] = res.players || [];
    } catch(e) {
      showToast('Failed to load ' + sport + ' data', 'error');
    } finally {
      hideLoading();
    }
  }

  updateSummaryStrip();
  renderPlayerList();
}

// ── RENDER SUMMARY STRIP ──────────────────────────────────────────────────
function updateSummaryStrip() {
  const strip = document.getElementById('summaryStrip');
  const players = state.data[state.sport] || [];

  const strongBuy = players.filter(p => p.tier === 'STRONG BUY').length;
  const buyCandidate = players.filter(p => p.tier === 'BUY CANDIDATE').length;
  const watchlist = players.filter(p => p.tier === 'WATCHLIST').length;

  // Use summary data if available
  let total = players.length;
  if (state.summary && state.summary[state.sport]) {
    const s = state.summary[state.sport];
    total = s.total || total;
  }

  strip.innerHTML = `
    <div class="summary-card total">
      <div class="sc-value">${total}</div>
      <div class="sc-label">Tracked</div>
    </div>
    <div class="summary-card strong-buy">
      <div class="sc-value">${strongBuy}</div>
      <div class="sc-label">Strong Buy</div>
    </div>
    <div class="summary-card buy-candidate">
      <div class="sc-value">${buyCandidate}</div>
      <div class="sc-label">Buy</div>
    </div>
    <div class="summary-card watchlist">
      <div class="sc-value">${watchlist}</div>
      <div class="sc-label">Watchlist</div>
    </div>
  `;
}

// ── RENDER PLAYER LIST ────────────────────────────────────────────────────
function renderPlayerList() {
  const container = document.getElementById('playerList');
  const titleEl = document.getElementById('listTitle');
  const countEl = document.getElementById('listCount');
  let players = state.data[state.sport] || [];

  // Filter by view
  if (state.view === 'watchlist') {
    players = players.filter(p => p.tier === 'WATCHLIST' || p.tier === 'BUY CANDIDATE' || p.tier === 'STRONG BUY');
    titleEl.textContent = 'WATCHLIST & ABOVE';
  } else if (state.view === 'strong') {
    players = players.filter(p => p.tier === 'STRONG BUY' || p.tier === 'BUY CANDIDATE');
    titleEl.textContent = 'BUY SIGNALS';
  } else if (state.view === 'all') {
    titleEl.textContent = 'ALL PLAYERS';
  } else {
    titleEl.textContent = 'TOP PLAYERS';
    players = players.slice(0, 20);
  }

  // Sort by score descending
  players = [...players].sort((a, b) => (b.score || 0) - (a.score || 0));

  countEl.textContent = players.length + ' players';

  if (players.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📋</div>
        <div class="empty-title">No Players Yet</div>
        <div class="empty-text">Enter signal scores in Google Sheets to start seeing players ranked here.</div>
      </div>
    `;
    return;
  }

  container.innerHTML = players.map((p, i) => renderPlayerCard(p, i + 1)).join('');

  // Draw sparklines after render
  players.forEach((p, i) => {
    drawSparkline('spark-' + (i + 1), getHistoryForPlayer(p.name));
    // Signal bars drawn on expand only — not on initial render
  });
}

// ── RENDER PLAYER CARD ────────────────────────────────────────────────────

  return `

  p.tier === 'STRONG BUY' ? '▲ Strong buy' :
  p.tier === 'BUY CANDIDATE' ? '● Buy candidate' :
  p.tier === 'WATCHLIST' ? '■ Watchlist' :
  '— Monitor'
}</span>
            </div>
          </div>
        </div>
        <div class="player-right">
          <div class="score-display ${scoreClass}" style="font-size:26px;font-weight:600;letter-spacing:-0.5px">${p.score || 0}<span style="font-size:11px;font-weight:400;color:var(--gray2);margin-left:1px">/100</span></div>
          ${scoreChangeHtml}
          ${rankChangeHtml}
        </div>
      </div>

      <div class="sparkline-container">
        <canvas id="spark-${rank}" width="400" height="72"></canvas>

      <div class="player-detail ${isExpanded ? 'open' : ''}" id="detail-${p.name.replace(/\s/g,'_')}">
        <div class="signal-bars" id="bars-${rank}" style="margin-bottom:12px"></div>
        <div class="detail-signals">
          ${renderSignalGrid(p)}
        </div>
        <button class="brief-btn" onclick="generateBrief(event, '${p.name}', ${p.row}, '${p.sport || state.sport}')" id="brief-btn-${rank}">
          <span class="btn-icon">⚡</span>

}

function getSignalColors(val, isNeg) {
  if (isNeg) {
    if (val <= 0) return { bg: 'rgba(100,116,139,0.1)', text: '#94a3b8', border: 'rgba(100,116,139,0.2)' };
    if (val >= 15) return { bg: 'rgba(220,38,38,0.18)', text: '#fca5a5', border: 'rgba(252,165,165,0.4)' };
    return { bg: 'rgba(217,119,6,0.18)', text: '#fcd34d', border: 'rgba(252,211,77,0.35)' };
  }
  if (val >= 9) return { bg: 'rgba(16,185,129,0.18)', text: '#34d399', border: 'rgba(52,211,153,0.4)' };
  if (val >= 7) return { bg: 'rgba(245,158,11,0.18)', text: '#fcd34d', border: 'rgba(252,211,77,0.4)' };
  if (val >= 4) return { bg: 'rgba(59,130,246,0.18)', text: '#93c5fd', border: 'rgba(147,197,253,0.4)' };
  if (val >= 1) return { bg: 'rgba(100,116,139,0.15)', text: '#94a3b8', border: 'rgba(100,116,139,0.25)' };
  return { bg: 'rgba(100,116,139,0.08)', text: '#475569', border: 'rgba(100,116,139,0.15)' };
}

function renderSignalGrid(p) {
  const signals = [
    { label: 'VEGAS', val: p.s1Vegas },
    { label: 'USAGE', val: p.s2Usage },
    { label: 'TRANS', val: p.s3Transactions },
    { label: 'PRESS', val: p.s4Reporter },
    { label: 'PROSP', val: p.s5Prospects },
    { label: 'PSA', val: p.s6PSA },
    { label: 'SEARCH', val: p.s7Search },
    { label: 'NEG', val: -(p.negSignals || 0) },
  ];

  return signals.map(s => {
    const val = parseFloat(s.val) || 0;
    const isNeg = s.label === 'NEG';
    const display = isNeg ? Math.abs(val) : val;
    const c = getSignalColors(display, isNeg);
    return `
      <div class="signal-row" style="background:${c.bg};border:1px solid ${c.border};border-radius:8px;padding:8px 10px;margin-bottom:4px">
        <span class="signal-name" style="color:${c.text};opacity:0.8">${s.label}</span>
        <span class="signal-score" style="color:${c.text};font-weight:600">${display}</span>
      </div>
    `;
  }).join('');
}

// ── SPARKLINE ─────────────────────────────────────────────────────────────
function getHistoryForPlayer(name) {
  return state.history[name] || [];
}

function drawSparkline(canvasId, historyData) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;

  const ctx = canvas.getContext('2d');
  const W = canvas.offsetWidth * 2;
  const H = canvas.offsetHeight * 2;
  canvas.width = W;
  canvas.height = H;
  ctx.clearRect(0, 0, W, H);

  // Filter by timeframe
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - state.timeframe);
  const filtered = historyData.filter(d => new Date(d.date) >= cutoff);

  if (filtered.length < 2) {
    // Draw flat line placeholder
    ctx.strokeStyle = 'rgba(100,116,139,0.3)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, H / 2);
    ctx.lineTo(W, H / 2);
    ctx.stroke();
    return;
  }

  const scores = filtered.map(d => d.score);
  const minS = Math.min(...scores);
  const maxS = Math.max(...scores);
  const range = maxS - minS || 1;

  const points = filtered.map((d, i) => ({
    x: (i / (filtered.length - 1)) * W,
    y: H - ((d.score - minS) / range) * (H * 0.8) - H * 0.1
  }));

  // Gradient fill
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, 'rgba(37,99,235,0.3)');
  grad.addColorStop(1, 'rgba(37,99,235,0)');

  ctx.beginPath();
  ctx.moveTo(points[0].x, H);
  points.forEach(p => ctx.lineTo(p.x, p.y));
  ctx.lineTo(points[points.length-1].x, H);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // Line
  ctx.beginPath();
  ctx.moveTo(points[0].x, points[0].y);
  points.forEach(p => ctx.lineTo(p.x, p.y));
  ctx.strokeStyle = '#2563eb';
  ctx.lineWidth = 3;
  ctx.lineJoin = 'round';
  ctx.stroke();

  // End dot
  const last = points[points.length - 1];
  ctx.beginPath();
  ctx.arc(last.x, last.y, 5, 0, Math.PI * 2);
  ctx.fillStyle = '#2563eb';
  ctx.fill();
}

function drawSignalBars(containerId, p) {
  const container = document.getElementById(containerId);
  if (!container) return;

  const signals = [
    { label: 'S1', val: parseFloat(p.s1Vegas) || 0 },
    { label: 'S2', val: parseFloat(p.s2Usage) || 0 },
    { label: 'S3', val: parseFloat(p.s3Transactions) || 0 },
    { label: 'S4', val: parseFloat(p.s4Reporter) || 0 },
    { label: 'S5', val: parseFloat(p.s5Prospects) || 0 },
    { label: 'S6', val: parseFloat(p.s6PSA) || 0 },
    { label: 'S7', val: parseFloat(p.s7Search) || 0 },
  ];

  container.innerHTML = signals.map(s => {
    const pct = Math.max(1, (s.val / 10) * 100);
    const color = s.val >= 9 ? '#34d399' :   // max — green
                  s.val >= 7 ? '#fcd34d' :   // high — amber
                  s.val >= 4 ? '#93c5fd' :   // mid — blue
                  'rgba(100,116,139,0.35)';  // low — gray
    return `
      <div class="signal-bar-wrap">
        <div class="signal-bar-label">${s.label}</div>
        <div class="signal-bar-track">
          <div class="signal-bar" style="width:${pct}%;background:${color}"></div>
        </div>
        <div class="signal-bar-value">${s.val > 0 ? s.val : ''}</div>
      </div>
    `;
  }).join('');
}

// ── TOGGLE PLAYER EXPAND ──────────────────────────────────────────────────
async function togglePlayer(name, row, sport) {
  const detailId = 'detail-' + name.replace(/\s/g, '_');
  const detail = document.getElementById(detailId);
  if (!detail) return;

  if (state.expandedPlayer === name) {
    state.expandedPlayer = null;
    detail.classList.remove('open');
    return;
  }

  state.expandedPlayer = name;
  detail.classList.add('open');

  // Draw signal bars now that the expanded section is visible
  if (state.players) {
    const idx = state.players.findIndex(p => p.name === name);
    if (idx !== -1) {
      drawSignalBars('bars-' + (idx + 1), state.players[idx]);
    }
  }

  // Load history for sparkline if not cached
  if (!state.history[name]) {
    try {
      const res = await fetchAPI('getHistory', { player: name, sport });
      state.history[name] = res.history || [];
      // Redraw sparklines
      renderPlayerList();
    } catch(e) {}
  }
}

// ── AI BRIEF GENERATION ───────────────────────────────────────────────────
async function generateBrief(event, playerName, row, sport) {
  event.stopPropagation();
  event.preventDefault();

  const btn = event.currentTarget;
  if (btn.disabled) return; // Prevent double-tap on mobile

  const outputId = btn.nextElementSibling.id;
  const output = document.getElementById(outputId);

  btn.disabled = true;
  btn.innerHTML = '<span class="btn-icon">⏳</span> Generating brief...';

  const players = state.data[sport] || [];
  const player = players.find(p => p.name === playerName);

  if (!player) {
    showToast('Player data not found', 'error');
    btn.disabled = false;
    btn.innerHTML = '<span class="btn-icon">⚡</span> Generate AI Brief';
    return;
  }

  // Check if we have a cached brief for today
  if (player.cachedBrief) {
    const today = new Date().toISOString().split('T')[0];
    const parts = player.cachedBrief.split('|BRIEF|');
    if (parts.length === 2 && parts[0] === today) {
      // Show cached brief immediately — no API call needed
      const modal = document.getElementById('briefModal');
      document.getElementById('briefModalTitle').textContent = '⚡ AI Brief — ' + playerName;
      document.getElementById('briefModalMeta').textContent = (player.sport || state.sport) + ' · ' + player.team + ' · ' + player.position + ' · Score: ' + player.score + ' · (cached)';
      document.getElementById('briefModalBody').textContent = parts[1];
      modal.classList.add('visible');
      btn.disabled = false;
      btn.innerHTML = '<span class="btn-icon">✓</span> Brief Generated';
      return;
    }
  }

  const level = player.level ? ` (${player.level})` : '';
  const scoreChangeStr = player.scoreChange > 0 ? `+${player.scoreChange}` : `${player.scoreChange}`;
  const rankChangeStr = player.rankChange > 0 ? `+${player.rankChange}` : `${player.rankChange}`;

  const signalContext = [];
  if (player.s1Vegas >= 8) signalContext.push(`S1 Vegas Odds (${player.s1Vegas}/10): Award futures odds moving significantly — sharp money is betting on a breakout`);
  else if (player.s1Vegas >= 5) signalContext.push(`S1 Vegas Odds (${player.s1Vegas}/10): Positive movement in award odds betting markets`);
  else if (player.s1Vegas > 0) signalContext.push(`S1 Vegas Odds (${player.s1Vegas}/10): Modest positive movement in betting markets`);
  if (player.s2Usage >= 8) signalContext.push(`S2 Usage/Role (${player.s2Usage}/10): Major role expansion — snap count or playing time has surged`);
  else if (player.s2Usage >= 5) signalContext.push(`S2 Usage/Role (${player.s2Usage}/10): Notable increase in playing time or role`);
  else if (player.s2Usage > 0) signalContext.push(`S2 Usage/Role (${player.s2Usage}/10): Slight uptick in usage`);
  if (player.s3Transactions >= 8) signalContext.push(`S3 Transactions (${player.s3Transactions}/10): Major roster move directly expanding this player's opportunity`);
  else if (player.s3Transactions >= 5) signalContext.push(`S3 Transactions (${player.s3Transactions}/10): Meaningful transaction activity affecting this player's role`);
  else if (player.s3Transactions > 0) signalContext.push(`S3 Transactions (${player.s3Transactions}/10): Minor transaction news in play`);
  if (player.s4Reporter >= 8) signalContext.push(`S4 Beat Reporter (${player.s4Reporter}/10): Named beat reporters citing sources — high-credibility insider information circulating`);
  else if (player.s4Reporter >= 5) signalContext.push(`S4 Beat Reporter (${player.s4Reporter}/10): Credible media coverage emerging`);
  else if (player.s4Reporter > 0) signalContext.push(`S4 Beat Reporter (${player.s4Reporter}/10): Some beat reporter coverage noted`);
  if (player.s5Prospects >= 8) signalContext.push(`S5 Prospect Trajectory (${player.s5Prospects}/10): Rapidly rising through rankings — entering a key tier before the market catches up`);
  else if (player.s5Prospects >= 5) signalContext.push(`S5 Prospect Trajectory (${player.s5Prospects}/10): Strong prospect ranking with positive momentum`);
  else if (player.s5Prospects > 0) signalContext.push(`S5 Prospect Trajectory (${player.s5Prospects}/10): Prospect on the radar with ranking momentum`);
  if (player.s6PSA >= 7) signalContext.push(`S6 PSA Grading Volume (${player.s6PSA}/10): Grading submissions surging — investors actively submitting cards, a leading indicator of price appreciation`);
  else if (player.s6PSA > 0) signalContext.push(`S6 PSA Grading Volume (${player.s6PSA}/10): Growing grading activity signals increasing investor interest`);
  if (player.s7Search >= 7) signalContext.push(`S7 Social Buzz (${player.s7Search}/10): Mention frequency spiking in card collector communities — awareness building ahead of broader market attention`);
  else if (player.s7Search > 0) signalContext.push(`S7 Social Buzz (${player.s7Search}/10): Increasing discussion in sports card communities`);

  const negContext = player.negSignals > 0 ? `\n\nNEGATIVE SIGNALS (${player.negSignals} penalty points): Injury, suspension, or adverse news is counteracting positive signals.` : '';
  const signalSummary = signalContext.length > 0 ? signalContext.join('\n') : 'No significant signals currently firing.';

  // Build sport-specific calendar context
  const now = new Date();
  const sportCalendar = {
    NFL: 'May 2026 NFL offseason. 2026 NFL Draft completed April 23-25. Free agency concluded. OTAs begin late May. Training camp opens late July. 2026 season begins September 2026.',
    MLB: 'May 2026, approximately 30 games into the 2026 MLB regular season.',
    NBA: 'May 2026 NBA Playoffs currently underway. Regular season concluded April 2026.'
  };
  const calCtx = sportCalendar[sport] || '';

  const prompt = `You are a sports card investment analyst. Write a specific, actionable intelligence brief for ${playerName}.

CRITICAL ACCURACY RULES — FAILURE TO FOLLOW THESE WILL RESULT IN A LOW QUALITY BRIEF:
1. Search for current facts FIRST — before writing any section
2. Only state facts you found in search results — never fill gaps with guesses or training data
3. Never invent statistics, contract figures, quotes, or team affiliations — if you cannot verify it, do not include it
4. If uncertain about a claim, say so explicitly: 'reportedly', 'per [source]', or 'as of [date]'
5. Confirm the player's CURRENT team via search — do not assume from training data
6. If search returns conflicting info, flag the conflict rather than picking one version

PLAYER PROFILE:
Name: ${playerName} | Sport: ${sport} | Team: ${player.team}${level} | Position: ${player.position}
Composite Score: ${player.score}/100 | Tier: ${player.tier} | Score Change: ${scoreChangeStr} | Rank Change: ${rankChangeStr}

CURRENT CALENDAR: ${calCtx}

ACTIVE SIGNALS:
${signalSummary}${negContext}

Before writing the brief, search for:
1. ${playerName} 2025 stats and performance
2. ${playerName} contract situation 2026
3. ${playerName} ${player.team} 2026 draft decisions and offseason moves

Pay special attention to what the team did NOT do in the draft or offseason — a team choosing not to draft a replacement for a player entering a contract year is often the strongest possible vote of confidence, and a key signal the card market may not have priced in yet.

Write a brief with exactly these five sections grounded in what you find:

1. OPPORTUNITY SUMMARY
Why is this specific player on the radar right now given the current calendar? Connect the signals to a concrete card investment thesis in 2-3 sentences. Be specific about the player's actual situation.

2. SIGNAL DRIVERS
Walk through each active signal with specific context. For transaction and reporter signals especially — explain what the SPECIFIC news was that generated the score, not a generic interpretation. If the team made a draft decision that affects this player's role, name it explicitly.

3. CARD MARKET CONTEXT
Name specific cards to target with realistic price ranges. Use correct licensed sets for 2025-26 (Topps Chrome for NFL/NBA, Bowman Chrome for MLB — not Panini for NFL/NBA). Where is the market underpricing this player?

4. RISK FACTORS
What specific risks apply to this player's actual situation? Be honest about what could go wrong.

5. VERDICT & TIMING
Clear action: Buy Now / Watch Closely / Hold / Avoid. Name the specific catalyst and realistic timeframe given the current ${calCtx}`;

  try {
    // Route through WebApp as GET to avoid CORS (Apps Script blocks POST from browser)
    const briefUrl = new URL(API_URL);
    briefUrl.searchParams.set('action', 'generateBrief');
    briefUrl.searchParams.set('prompt', prompt);
    briefUrl.searchParams.set('sport', sport);
    briefUrl.searchParams.set('row', row);

    const response = await fetch(briefUrl.toString(), { method: 'GET' });
    const data = await response.json();
    const briefText = data.brief || data.error || 'Unable to generate brief.';

    // Show in modal
    const modal = document.getElementById('briefModal');
    document.getElementById('briefModalTitle').textContent = '⚡ AI Brief — ' + playerName;
    document.getElementById('briefModalMeta').textContent = (player.sport || state.sport) + ' · ' + player.team + ' · ' + player.position + ' · Score: ' + player.score;
    // Convert URLs in brief text to clickable links
    function linkify(text) {
      const escaped = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      return escaped.replace(/(https?:\/\/[^\s<]+)/g, function(url) {
        // Clean trailing punctuation
        const clean = url.replace(/[.,;:)]+$/, '');
        return '<a href="' + clean + '" target="_blank" rel="noopener" style="color:#7FB3D3;text-decoration:underline;word-break:break-all;">' + clean + '</a>';
      });
    }

    // Split out SOURCES section if present
    const sourceSplit = briefText.split('\n---\nSOURCES:\n');
    const mainText = sourceSplit[0];

    // Convert markdown headers to styled text
    let bodyHTML = linkify(mainText);

    if (sourceSplit.length > 1) {
      const sourcesRaw = sourceSplit[1];
      const sourcesHTML = '<div style="margin-top:16px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.1);"><div style="color:#7FB3D3;font-size:11px;font-weight:700;margin-bottom:8px;letter-spacing:0.5px;">SOURCES</div>' +
        linkify(sourcesRaw) + '</div>';
      document.getElementById('briefModalBody').innerHTML =
        '<pre style="white-space:pre-wrap;margin:0;font-family:inherit">' + bodyHTML + '</pre>' + sourcesHTML;
    } else {
      document.getElementById('briefModalBody').innerHTML =
        '<pre style="white-space:pre-wrap;margin:0;font-family:inherit">' + bodyHTML + '</pre>';
    }
    modal.classList.add('visible');
    btn.innerHTML = '<span class="btn-icon">✓</span> Brief Generated';
    btn.disabled = false;

    // Brief is cached server-side automatically by WebApp generateBrief handler

  } catch(err) {
    showToast('Failed to generate brief', 'error');
    btn.disabled = false;
    btn.innerHTML = '<span class="btn-icon">⚡</span> Generate AI Brief';
  }
}

// ── TIMEFRAME ─────────────────────────────────────────────────────────────
function setTimeframe(days, btn) {
  state.timeframe = days;
  document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderPlayerList();
}

// ── VIEW ──────────────────────────────────────────────────────────────────
function setView(view) {
  state.view = view;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  event.currentTarget.classList.add('active');
  renderPlayerList();
}

// ── SOURCE HEALTH ─────────────────────────────────────────────────────────
function updateSourceIndicator() {
  if (!state.sources) return;
  const dot = document.getElementById('sourceDot');
  const text = document.getElementById('sourceText');

  if (state.sources.hasIssues) {
    dot.className = 'source-dot warning';
    text.textContent = state.sources.issueCount + ' ISSUE' + (state.sources.issueCount > 1 ? 'S' : '');
  } else {
    dot.className = 'source-dot';
    text.textContent = 'SOURCES OK';
  }
}

function renderSourceModal() {
  if (!state.sources) return;
  const list = document.getElementById('sourceList');
  const primarySources = (state.sources.sources || []).filter(s => s.type === 'PRIMARY');

  list.innerHTML = primarySources.map(s => `
    <div class="source-item">
      <div class="source-item-left">
        <div class="source-item-name">${s.name}</div>
        <div class="source-item-signal">${s.signal}${s.daysOnBackup ? ' · ' + s.daysOnBackup + ' days on backup' : ''}</div>
      </div>
      <span class="source-status-badge ${s.status.toLowerCase().replace(' ', '-')}">${s.status}</span>
    </div>
  `).join('');
}

function openSourceModal() {
  renderSourceModal();
  document.getElementById('sourceModal').classList.add('visible');
}

function closeModal() {
  document.getElementById('sourceModal').classList.remove('visible');
}

// ── BADGES ────────────────────────────────────────────────────────────────
function updateBadges() {
  ['NFL', 'MLB', 'NBA'].forEach(sport => {
    const players = state.data[sport] || [];
    const hot = players.filter(p => p.tier === 'STRONG BUY' || p.tier === 'BUY CANDIDATE').length;
    const badge = document.getElementById('badge-' + sport);
    if (badge) {
      if (hot > 0) {
        badge.textContent = hot;
        badge.style.display = 'block';
      } else {
        badge.style.display = 'none';
      }
    }
  });
}

// ── LAST UPDATED ──────────────────────────────────────────────────────────
function updateLastUpdated() {
  const el = document.getElementById('lastUpdated');
  const now = new Date();
  el.textContent = 'Updated ' + now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

// ── HELPERS ───────────────────────────────────────────────────────────────
function getTierClass(tier) {
  if (!tier) return 'monitor';
  const t = tier.toLowerCase();
  if (t === 'strong buy') return 'strong-buy';
  if (t === 'buy candidate') return 'buy-candidate';
  if (t === 'watchlist') return 'watchlist';
  return 'monitor';
}

function showLoading(text = 'Loading...') {
  document.getElementById('loadingText').textContent = text;
  document.getElementById('loadingOverlay').classList.add('visible');
}

function hideLoading() {
  document.getElementById('loadingOverlay').classList.remove('visible');
}

function showToast(msg, type = '') {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast visible ' + type;
  setTimeout(() => toast.classList.remove('visible'), 3000);
}

function renderError() {
  document.getElementById('playerList').innerHTML = `
    <div class="empty-state">
      <div class="empty-icon">⚠️</div>
      <div class="empty-title">Connection Error</div>
      <div class="empty-text">Could not reach Google Sheets. Check your internet connection and try refreshing.</div>
    </div>
  `;
}

// Close modal on overlay click
document.getElementById('sourceModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

function closeBriefModal(event) {
  if (event.target === document.getElementById('briefModal')) {
    document.getElementById('briefModal').classList.remove('visible');
  }
}

</script>

  <!-- ── BRIEF MODAL ── -->
  <div class="brief-modal-overlay" id="briefModal" onclick="closeBriefModal(event)">
    <div class="brief-modal">
      <div class="brief-modal-header">
        <div>
          <div class="brief-modal-title" id="briefModalTitle">AI Brief</div>
          <div class="brief-modal-meta" id="briefModalMeta"></div>
        </div>
        <button class="brief-modal-close" onclick="document.getElementById('briefModal').classList.remove('visible')">✕</button>
      </div>
      <div class="brief-modal-body" id="briefModalBody"></div>
    </div>
  </div>

</body>
</html>
