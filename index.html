<!DOCTYPE html>
<!-- SCOSF Dashboard v4.9.1 — 2026-05-03 — rank/score change UX cleanup -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0e1a">
<title>SCOSF — Card Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0a0e1a;
    --navy2: #111827;
    --navy3: #1a2235;
    --border: #1e2d45;
    --blue: #2563eb;
    --blue-glow: rgba(37,99,235,0.3);
    --teal: #0891b2;
    --green: #059669;
    --green-light: #d1fae5;
    --green-text: #10b981;
    --amber: #d97706;
    --amber-light: #fef3c7;
    --red: #dc2626;
    --red-light: #fee2e2;
    --blue-light: #dbeafe;
    --gray: #b0bfcc;
    --gray2: #7d93ab;
    --white: #f8fafc;
    --font-display: 'Bebas Neue', sans-serif;
    --font-body: 'DM Sans', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--navy);
    color: var(--white);
    font-family: var(--font-body);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 20% 0%, rgba(37,99,235,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 100%, rgba(8,145,178,0.06) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,14,26,0.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
  }

  .header-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    max-width: 480px;
    margin: 0 auto;
  }

  .logo {
    font-family: var(--font-display);
    font-size: 26px;
    letter-spacing: 2px;
    color: var(--white);
    line-height: 1;
  }

  .logo span { color: var(--blue); }
  .version-badge { font-size: 9px; color: var(--gray2); margin-left: 6px; opacity: 0.6; }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .source-indicator {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-family: var(--font-mono);
    color: var(--gray2);
    cursor: pointer;
  }

  .source-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--green-text);
    animation: pulse-dot 2s infinite;
  }

  .source-dot.warning { background: var(--amber); }
  .source-dot.error { background: var(--red); }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .refresh-btn {
    background: none;
    border: none;
    color: var(--gray);
    cursor: pointer;
    padding: 6px;
    border-radius: 8px;
    transition: color 0.2s, background 0.2s;
    font-size: 16px;
  }

  .refresh-btn:hover { color: var(--white); background: var(--navy3); }
  .refresh-btn.spinning { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .sport-tabs {
    display: flex;
    gap: 0;
    padding: 12px 16px 0;
    max-width: 480px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  .sport-tab {
    flex: 1;
    padding: 10px 8px;
    text-align: center;
    font-family: var(--font-display);
    font-size: 18px;
    letter-spacing: 1.5px;
    color: var(--gray2);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    position: relative;
  }

  .sport-tab.active {
    color: var(--white);
    border-bottom-color: var(--blue);
  }

  .sport-tab .badge {
    position: absolute;
    top: 4px;
    right: 8px;
    background: var(--green-text);
    color: var(--navy);
    font-family: var(--font-mono);
    font-size: 9px;
    font-weight: 500;
    padding: 1px 4px;
    border-radius: 4px;
    line-height: 1.4;
  }

  /* Pipeline submenu — shown for NFL and MLB */
  .pipeline-bar {
    display: none;
    gap: 6px;
    padding: 8px 16px;
    background: rgba(0,0,0,0.15);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .pipeline-bar::-webkit-scrollbar { display: none; }

  .pipe-btn {
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.15);
    background: transparent;
    color: rgba(255,255,255,0.5);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .pipe-btn.active {
    background: rgba(255,255,255,0.12);
    color: #fff;
    border-color: rgba(255,255,255,0.3);
  }

  .summary-strip {
    display: flex;
    gap: 6px;
    padding: 10px 16px 10px;
    max-width: 100%;
    margin: 0 auto;
    overflow-x: auto;
    scrollbar-width: none;
    position: relative;
    z-index: 1;
  }

  .summary-strip::-webkit-scrollbar { display: none; }

  .summary-card {
    flex: 1;
    flex-shrink: 0;
    background: var(--navy2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 6px 8px;
    min-width: 0;
    text-align: center;
  }

  .summary-card .sc-value {
    font-family: var(--font-display);
    font-size: 22px;
    line-height: 1;
    margin-bottom: 2px;
  }

  .summary-card .sc-label {
    font-size: 8px;
    font-family: var(--font-mono);
    color: var(--gray2);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .summary-card.strong-buy .sc-value { color: var(--green-text); }
  .summary-card.buy-candidate .sc-value { color: var(--green); }
  .summary-card.watchlist .sc-value { color: var(--amber); }
  .summary-card.total .sc-value { color: var(--white); }
  .summary-card.monitor .sc-value { color: #7dd3fc; }

  .list-container {
    padding: 0 16px 100px;
    max-width: 480px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  .list-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .list-title {
    font-family: var(--font-display);
    font-size: 20px;
    letter-spacing: 1px;
    color: var(--gray);
  }

  .list-count {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--gray2);
  }

  .player-card {
    background: var(--navy2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 12px;
    margin-bottom: 6px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .player-card::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    border-radius: 3px 0 0 3px;
  }

  .player-card.strong-buy::before { background: var(--green-text); }
  .player-card.buy-candidate::before { background: var(--green-text); }
  .player-card.watchlist::before { background: var(--amber); }
  .player-card.monitor::before { background: var(--border); }

  .player-card:active { transform: scale(0.98); }

  .player-card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 6px;
  }

  .player-left {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
    min-width: 0;
  }

  .rank-badge {
    font-family: var(--font-display);
    font-size: 18px;
    color: var(--gray2);
    min-width: 24px;
    line-height: 1;
  }

  .player-info { min-width: 0; flex: 1; }

  .player-name {
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 14px;
    color: var(--white);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 2px;
  }

  .player-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }

  .player-team {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--gray2);
  }

  .player-pos {
    font-family: var(--font-mono);
    font-size: 10px;
    background: var(--navy3);
    color: var(--gray);
    padding: 1px 6px;
    border-radius: 4px;
  }

  /* Level pill for MLB pipeline */
  .level-pill {
    font-family: var(--font-mono);
    font-size: 9px;
    font-weight: 600;
    padding: 1px 6px;
    border-radius: 4px;
    letter-spacing: 0.3px;
  }
  .level-pill.mlb    { background: rgba(16,185,129,0.2);  color: #34d399; }
  .level-pill.minors { background: rgba(37,99,235,0.2);   color: #93c5fd; }
  .level-pill.ncaa   { background: rgba(245,158,11,0.2);  color: #fcd34d; }
  .level-pill.hs     { background: rgba(167,139,250,0.2); color: #c4b5fd; }

  .tier-pill {
    font-family: var(--font-mono);
    font-size: 9px;
    font-weight: 500;
    padding: 2px 7px;
    border-radius: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-radius: 20px;
    display: inline-flex;
    align-items: center;
    gap: 3px;
  }
  .tier-pill.strong-buy   { background: rgba(16,185,129,0.18); color: #34d399; border: 1px solid rgba(52,211,153,0.4); }
  .tier-pill.buy-candidate{ background: rgba(16,185,129,0.18); color: var(--green-text); border: 1px solid rgba(52,211,153,0.4); }
  .tier-pill.watchlist    { background: rgba(245,158,11,0.18); color: #fcd34d; border: 1px solid rgba(252,211,77,0.4); }
  .tier-pill.monitor      { background: rgba(100,116,139,0.12); color: #94a3b8; border: 1px solid rgba(100,116,139,0.25); }

  .player-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
    margin-left: 8px;
  }

  .score-display {
    font-family: var(--font-display);
    font-size: 32px;
    line-height: 1;
    color: var(--white);
  }

  .rank-change {
    display: flex;
    align-items: center;
    gap: 3px;
    font-family: var(--font-mono);
    font-size: 11px;
  }

  .rank-change.up { color: var(--green-text); }
  .rank-change.down { color: var(--red); }
  .rank-change.flat { color: var(--gray2); }

  .sparkline-container { height: 0px; margin: 0; overflow: hidden; }
  .sparkline-container canvas { width: 100%; height: 100%; }

  .signal-bars { display: flex; flex-direction: column; gap: 4px; margin-top: 10px; }
  .signal-bar-wrap { display: flex; align-items: center; gap: 6px; }
  .signal-bar-label { font-size: 10px; color: var(--gray2); width: 18px; flex-shrink: 0; }
  .signal-bar-track { flex: 1; height: 5px; background: rgba(100,116,139,0.15); border-radius: 3px; overflow: hidden; }
  .signal-bar { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
  .signal-bar-value { font-size: 10px; color: var(--gray2); width: 14px; text-align: right; flex-shrink: 0; }

  .mini-bars { display: flex; gap: 3px; margin-top: 5px; align-items: center; height: 6px; padding: 0 2px; }
  .mini-bar-wrap { flex: 1; height: 100%; display: flex; align-items: center; }
  .mini-bar { width: 100%; height: 3px; border-radius: 2px; }

  .player-detail { display: none; margin-top: 8px; padding-top: 8px; }
  .player-detail.open { display: block; }

  .detail-signals { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 12px; }

  .signal-row { display: flex; align-items: center; justify-content: space-between; border-radius: 8px; padding: 7px 10px; }
  .signal-name { font-family: var(--font-mono); font-size: 10px; color: var(--gray); }
  .signal-score { font-family: var(--font-display); font-size: 18px; color: var(--white); }

  .brief-btn {
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    width: 100%;
    padding: 10px;
    background: linear-gradient(135deg, rgba(37,99,235,0.2), rgba(8,145,178,0.2));
    border: 1px solid rgba(37,99,235,0.4);
    border-radius: 8px;
    color: #60a5fa;
    font-family: var(--font-body);
    font-weight: 500;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
  }
  .brief-btn:hover { background: linear-gradient(135deg, rgba(37,99,235,0.35), rgba(8,145,178,0.35)); border-color: rgba(37,99,235,0.7); }
  .brief-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .brief-btn .btn-icon { font-size: 14px; }

  .brief-output { display: none; }

  .brief-modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.75);
    z-index: 1000;
    padding: 20px;
    overflow-y: auto;
  }
  .brief-modal-overlay.visible { display: flex; align-items: flex-start; justify-content: center; }
  .brief-modal { background: var(--navy2); border: 1px solid var(--border); border-radius: 14px; width: 100%; max-width: 640px; margin: 20px auto; overflow: hidden; }
  .brief-modal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; background: var(--navy3); border-bottom: 1px solid var(--border); }
  .brief-modal-title { font-size: 15px; font-weight: 700; color: var(--white); }
  .brief-modal-meta { font-size: 11px; color: var(--gray2); margin-top: 2px; }
  .brief-modal-close { background: none; border: none; color: var(--gray2); font-size: 22px; cursor: pointer; padding: 0 4px; line-height: 1; }
  .brief-modal-close:hover { color: var(--white); }
  .brief-modal-body { padding: 20px; font-size: 13px; line-height: 1.7; color: var(--gray); white-space: pre-wrap; max-height: 70vh; overflow-y: auto; }
  .brief-modal-body strong, .brief-modal-body b { color: var(--white); }

  .loading-overlay { display: none; position: fixed; inset: 0; background: rgba(10,14,26,0.85); z-index: 200; align-items: center; justify-content: center; flex-direction: column; gap: 16px; }
  .loading-overlay.visible { display: flex; }
  .loader { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; }
  .loading-text { font-family: var(--font-mono); font-size: 13px; color: var(--gray); }

  .empty-state { text-align: center; padding: 48px 24px; color: var(--gray2); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-title { font-family: var(--font-display); font-size: 22px; margin-bottom: 8px; color: var(--gray); }
  .empty-text { font-size: 13px; line-height: 1.6; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(10,14,26,0.9); z-index: 150; align-items: flex-end; justify-content: center; padding: 0; }
  .modal-overlay.visible { display: flex; }
  .modal { background: var(--navy2); border: 1px solid var(--border); border-radius: 20px 20px 0 0; padding: 20px 16px 40px; width: 100%; max-width: 480px; max-height: 80vh; overflow-y: auto; animation: slideUp 0.3s ease; }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .modal-title { font-family: var(--font-display); font-size: 22px; letter-spacing: 1px; }
  .modal-close { background: var(--navy3); border: none; color: var(--gray); width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }

  .source-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; background: var(--navy3); border-radius: 8px; margin-bottom: 6px; }
  .source-item-left { flex: 1; min-width: 0; }
  .source-item-name { font-weight: 500; font-size: 13px; margin-bottom: 2px; }
  .source-item-signal { font-family: var(--font-mono); font-size: 10px; color: var(--gray2); }
  .source-status-badge { font-family: var(--font-mono); font-size: 10px; padding: 3px 8px; border-radius: 8px; font-weight: 500; }
  .source-status-badge.active { background: rgba(16,185,129,0.15); color: var(--green-text); }
  .source-status-badge.backup { background: rgba(217,119,6,0.15); color: #fbbf24; }
  .source-status-badge.down { background: rgba(220,38,38,0.15); color: #f87171; }
  .source-status-badge.standby { background: rgba(100,116,139,0.1); color: var(--gray2); }

  .bottom-nav { display: none !important; }

  .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--navy3); border: 1px solid var(--border); border-radius: 10px; padding: 10px 16px; font-size: 13px; color: var(--gray); opacity: 0; transition: all 0.3s; z-index: 300; white-space: nowrap; pointer-events: none; }
  .toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.error { border-color: rgba(220,38,38,0.4); color: #f87171; }
  .toast.success { border-color: rgba(16,185,129,0.4); color: var(--green-text); }

  .last-updated { font-family: var(--font-mono); font-size: 10px; color: var(--gray2); position: relative; z-index: 1; }

  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .summary-card.clickable { cursor: pointer; transition: transform 0.15s, opacity 0.15s; }
  .summary-card.clickable:active { transform: scale(0.96); }
  .summary-card.active-filter { background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.3); }

  .license-icon { display: inline-block; font-size: 9px; color: #f59e0b; margin-left: 4px; vertical-align: middle; cursor: help; }

  .draft-pill { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 10px; font-weight: 600; background: rgba(99,102,241,0.2); color: #a5b4fc; border: 1px solid rgba(99,102,241,0.3); letter-spacing: 0.3px; }

  .card-suggestions { margin: 12px 0; border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; overflow: hidden; }
  .cs-header { padding: 8px 12px; background: rgba(255,255,255,0.04); font-size: 10px; font-weight: 700; letter-spacing: 1px; color: rgba(255,255,255,0.4); border-bottom: 1px solid rgba(255,255,255,0.06); }
  .cs-tier-block { padding: 8px 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .cs-tier-block:last-child { border-bottom: none; }
  .cs-tier-label { font-size: 9px; font-weight: 700; letter-spacing: 1px; margin-bottom: 6px; }
  .cs-tier-label.low { color: #94a3b8; }
  .cs-tier-label.mid { color: #60a5fa; }
  .cs-tier-label.high { color: #fcd34d; }
  .cs-card-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 3px; padding: 3px 4px; border-radius: 4px; transition: background 0.15s; }
  .cs-card-row:hover { background: rgba(255,255,255,0.06); }
  .cs-card-name { font-size: 11px; color: rgba(255,255,255,0.7); flex: 1; padding-right: 8px; }
  .cs-card-price { font-size: 11px; font-weight: 600; color: #34d399; font-family: var(--font-mono); white-space: nowrap; }
  .cs-card-qty { font-size: 10px; color: rgba(255,255,255,0.3); margin-left: 6px; white-space: nowrap; }
  .cs-loading { padding: 16px; text-align: center; color: rgba(255,255,255,0.3); font-size: 12px; }
  .cs-empty { padding: 10px 12px; font-size: 11px; color: rgba(255,255,255,0.3); font-style: italic; }

  .load-more-btn { width: 100%; padding: 14px; margin-top: 8px; background: transparent; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: rgba(255,255,255,0.4); font-size: 12px; font-weight: 600; letter-spacing: 0.5px; cursor: pointer; transition: all 0.15s; }
  .load-more-btn:hover { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.7); }
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loader"></div>
  <div class="loading-text" id="loadingText">Loading intelligence...</div>
</div>

<div class="modal-overlay" id="sourceModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">SOURCE HEALTH</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="sourceList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<header>
  <div class="header-inner">
    <div class="logo">SCO<span>SF</span><span class="version-badge">v4.9.1</span></div>
    <div class="header-right">
      <div class="source-indicator" onclick="openSourceModal()" id="sourceIndicator">
        <div class="source-dot" id="sourceDot"></div>
        <span id="sourceText">SOURCES</span>
      </div>
      <button class="refresh-btn" id="refreshBtn" onclick="loadData(true)">↻</button>
    </div>
  </div>
</header>

<div class="sport-tabs">
  <div class="sport-tab active" onclick="switchSport('NFL')" id="tab-NFL">
    NFL
    <span class="badge" id="badge-NFL" style="display:none"></span>
  </div>
  <div class="sport-tab" onclick="switchSport('MLB')" id="tab-MLB">
    MLB
    <span class="badge" id="badge-MLB" style="display:none"></span>
  </div>
  <div class="sport-tab" onclick="switchSport('NBA')" id="tab-NBA">
    NBA
    <span class="badge" id="badge-NBA" style="display:none"></span>
  </div>
</div>

<!-- Pipeline submenu — NFL and MLB each have their own set of pills -->
<div class="pipeline-bar" id="pipelineBar"></div>

<div class="summary-strip" id="summaryStrip"></div>

<div class="list-container">
  <div class="list-header" style="display:flex;align-items:flex-end;justify-content:space-between">
    <div class="list-title" id="listTitle" style="text-align:left">TOP PLAYERS</div>
    <div class="last-updated" id="lastUpdated" style="padding:0;font-size:11px;text-align:right"></div>
  </div>
  <div id="playerList"></div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbxbJfBx6Wd4rbAJFQTmRx11YNHAL8LxI3EKp6mKSLwhh9pAF_tMqFFthhuamqlLkLKl/exec';

// Pipeline config per sport
const PIPELINES = {
  NFL: [
    { id: 'nfl',  label: 'NFL' },
    { id: '2026', label: '2026' },
    { id: '2027', label: '2027' },
    { id: '2028', label: '2028' },
    { id: '2029', label: '2029+' },
  ],
  MLB: [
    { id: 'mlb',    label: 'MLB' },
    { id: 'MINORS', label: 'MINORS' },
    { id: 'NCAA',   label: 'NCAA' },
    { id: 'HS',     label: 'HS' },
  ]
};

let state = {
  sport: 'NFL',
  view: 'all',
  pipeline: 'nfl',
  data: { NFL: null, MLB: null, NBA: null, 'NCAA FB': null },
  history: {},
  sources: null,
  summary: null,
  expandedPlayer: null,
  loading: false,
  switching: false,
  pageLimit: 20
};

document.addEventListener('DOMContentLoaded', () => {
  renderPipelineBar('NFL');
  loadData(false);
});

// ── PIPELINE BAR ──────────────────────────────────────────────────────────
function renderPipelineBar(sport) {
  const bar = document.getElementById('pipelineBar');
  const pills = PIPELINES[sport];

  if (!pills) {
    bar.style.display = 'none';
    bar.innerHTML = '';
    return;
  }

  bar.style.display = 'flex';
  bar.innerHTML = pills.map(p => `
    <button class="pipe-btn ${p.id === state.pipeline ? 'active' : ''}"
      onclick="setPipeline('${p.id}')"
      id="pipe-${p.id}">
      ${p.label}
    </button>
  `).join('');
}

// ── DATA LOADING ──────────────────────────────────────────────────────────
async function loadData(showLoader = true) {
  if (state.loading) return;
  state.loading = true;

  const refreshBtn = document.getElementById('refreshBtn');
  refreshBtn.classList.add('spinning');
  if (showLoader) showLoading('Fetching latest scores...');

  try {
    const [summaryRes, playersRes] = await Promise.all([
      fetchAPI('getDashboardSummary'),
      fetchAPI('getTopPlayers', { sport: state.sport, limit: 200 })
    ]);

    state.summary = summaryRes;
    state.data[state.sport] = playersRes.players || [];

    loadOtherSports();

    if (!state.data['NCAA FB']) {
      fetchAPI('getTopPlayers', { sport: 'NCAA FB', limit: 200, draftYear: '' })
        .then(res => { state.data['NCAA FB'] = res.players || []; })
        .catch(() => {});
    }

    fetchAPI('getSourceHealth').then(res => {
      state.sources = res;
      updateSourceIndicator();
      renderSourceModal();
    });

    updateSummaryStrip();
    updateBadges();
    renderPlayerList();
    updateLastUpdated();

  } catch(err) {
    showToast('Failed to load data. Check connection.', 'error');
    renderError();
  } finally {
    state.loading = false;
    refreshBtn.classList.remove('spinning');
    hideLoading();
  }
}

async function loadOtherSports() {
  const others = ['NFL', 'MLB', 'NBA'].filter(s => s !== state.sport);
  others.forEach(sport => {
    fetchAPI('getTopPlayers', { sport, limit: 200 })
      .then(res => { state.data[sport] = res.players || []; updateBadges(); })
      .catch(() => {});
  });
}

async function fetchAPI(action, params = {}) {
  const url = new URL(API_URL);
  url.searchParams.set('action', action);
  Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
  const res = await fetch(url.toString(), { method: 'GET', redirect: 'follow' });
  if (!res.ok) throw new Error('API error: ' + res.status);
  return await res.json();
}

async function switchSport(sport) {
  state.sport = sport;
  state.expandedPlayer = null;
  state.pageLimit = 25;
  state.view = 'all';

  // Set default pipeline per sport
  if (sport === 'NFL') state.pipeline = 'nfl';
  else if (sport === 'MLB') state.pipeline = 'mlb';
  else state.pipeline = null;

  // Render pipeline bar for this sport (or hide if none)
  renderPipelineBar(sport);

  // Update tabs
  document.querySelectorAll('.sport-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + sport).classList.add('active');

  if (!state.data[sport]) {
    showLoading('Loading ' + sport + ' players...');
    try {
      state.switching = true;
      const res = await fetchAPI('getTopPlayers', { sport, limit: 200 });
      state.data[sport] = res.players || [];
      state.switching = false;
    } catch(e) {
      showToast('Failed to load ' + sport + ' data', 'error');
    } finally {
      hideLoading();
    }
  }

  updateSummaryStrip();
  renderPlayerList();
}

// ── GET CURRENT PLAYERS based on sport + pipeline ─────────────────────────
function getCurrentPlayers() {
  const sport = state.sport;
  const pipeline = state.pipeline;

  if (sport === 'NFL') {
    if (pipeline === 'nfl' || !pipeline) {
      return state.data['NFL'] || [];
    }
    // NCAA FB draft class filter
    let players = state.data['NCAA FB'] || [];
    if (pipeline === '2026') return players.filter(p => parseInt(p.draftEligible) <= 2026);
    if (pipeline === '2027') return players.filter(p => parseInt(p.draftEligible) === 2027);
    if (pipeline === '2028') return players.filter(p => parseInt(p.draftEligible) === 2028);
    if (pipeline === '2029') return players.filter(p => parseInt(p.draftEligible) >= 2029);
    return players;
  }

  if (sport === 'MLB') {
    let players = state.data['MLB'] || [];
    if (pipeline === 'mlb')    return players.filter(p => p.level === 'MLB');
    if (pipeline === 'MINORS') return players.filter(p => p.level === 'MINORS');
    if (pipeline === 'NCAA')   return players.filter(p => p.level === 'NCAA');
    if (pipeline === 'HS')     return players.filter(p => p.level === 'HS');
    return players; // fallback: all
  }

  return state.data[sport] || [];
}

// ── RENDER SUMMARY STRIP ──────────────────────────────────────────────────
function updateSummaryStrip() {
  const strip = document.getElementById('summaryStrip');
  const players = getCurrentPlayers();

  const strongBuy   = players.filter(p => p.tier === 'STRONG BUY').length;
  const buyCandidate= players.filter(p => p.tier === 'BUY CANDIDATE').length;
  const watchlist   = players.filter(p => p.tier === 'WATCHLIST').length;
  const monitor     = players.filter(p => p.tier === 'MONITOR' || !p.tier).length;
  const total       = players.length;

  strip.innerHTML = `
    <div class="summary-card total clickable ${state.view === 'all' ? 'active-filter' : ''}" onclick="setView('all')">
      <div class="sc-value">${total}</div>
      <div class="sc-label">All</div>
    </div>
    <div class="summary-card monitor clickable ${state.view === 'rankings' ? 'active-filter' : ''}" onclick="setView('rankings')">
      <div class="sc-value" style="${state.view !== 'rankings' ? 'color:#7dd3fc' : ''}">${monitor}</div>
      <div class="sc-label">Monitor</div>
    </div>
    <div class="summary-card watchlist clickable ${state.view === 'watchlist' ? 'active-filter' : ''}" onclick="setView('watchlist')">
      <div class="sc-value">${watchlist}</div>
      <div class="sc-label">Watchlist</div>
    </div>
    <div class="summary-card strong-buy clickable ${state.view === 'strong' ? 'active-filter' : ''}" onclick="setView('strong')">
      <div class="sc-value">${strongBuy + buyCandidate}</div>
      <div class="sc-label">Buy</div>
    </div>
  `;
}

// ── RENDER PLAYER LIST ────────────────────────────────────────────────────
function renderPlayerList() {
  const container = document.getElementById('playerList');
  const titleEl   = document.getElementById('listTitle');

  let players = getCurrentPlayers();

  if (state.view === 'watchlist') {
    players = players.filter(p => p.tier === 'WATCHLIST');
    titleEl.textContent = 'WATCHLIST';
  } else if (state.view === 'strong') {
    players = players.filter(p => p.tier === 'STRONG BUY' || p.tier === 'BUY CANDIDATE');
    titleEl.textContent = 'BUY SIGNALS';
  } else if (state.view === 'rankings') {
    players = players.filter(p => p.tier === 'MONITOR' || !p.tier);
    titleEl.textContent = 'MONITOR';
  } else {
    titleEl.textContent = 'ALL PLAYERS';
  }

  players = [...players].sort((a, b) => (b.score || 0) - (a.score || 0));
  // player count shown in summary strip ALL card

  if (players.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📋</div>
        <div class="empty-title">No Players Yet</div>
        <div class="empty-text">Enter signal scores in Google Sheets to start seeing players ranked here.</div>
      </div>`;
    return;
  }

  const PAGE_SIZE = 20;
  const currentLimit = state.pageLimit || PAGE_SIZE;
  const visiblePlayers = players.slice(0, currentLimit);
  const remaining = players.length - currentLimit;

  container.innerHTML = visiblePlayers.map((p, i) => renderPlayerCard(p, i + 1)).join('');

  visiblePlayers.forEach((p, i) => {
    drawSparkline('spark-' + (i + 1), getHistoryForPlayer(p.name));
  });

  if (remaining > 0) {
    const loadMore = document.createElement('button');
    loadMore.className = 'load-more-btn';
    loadMore.textContent = `Show ${Math.min(20, remaining)} more (${remaining} remaining)`;
    loadMore.onclick = (e) => {
      e.stopPropagation();
      state.pageLimit = currentLimit + PAGE_SIZE;
      const scrollY = window.scrollY;
      renderPlayerList();
      setTimeout(() => window.scrollTo(0, scrollY + 200), 50);
    };
    container.appendChild(loadMore);
  }
}

// ── RENDER PLAYER CARD ────────────────────────────────────────────────────
function renderPlayerCard(p, rank) {
  const tierClass = getTierClass(p.tier);
  const rankChange = p.rankChange || 0;
  const rankChangeHtml = rankChange > 0
    ? `<span class="rank-change up">▲ ${rankChange}</span>`
    : rankChange < 0
    ? `<span class="rank-change down">▼ ${Math.abs(rankChange)}</span>`
    : `<span class="rank-change flat">— 0</span>`;

  const scoreChange = p.scoreChange || 0;
  const scoreChangeHtml = scoreChange > 0
    ? `<span style="color:var(--green-text);font-size:11px;font-family:var(--font-mono)">+${scoreChange}</span>`
    : scoreChange < 0
    ? `<span style="color:var(--red);font-size:11px;font-family:var(--font-mono)">${scoreChange}</span>`
    : '';

  const isExpanded = state.expandedPlayer === p.name;

  // Level pill for MLB
  let levelPill = '';
  if (p.sport === 'MLB' || state.sport === 'MLB') {
    const lvl = (p.level || '').toLowerCase();
    const lvlLabel = p.level || '';
    if (lvlLabel) {
      levelPill = `<span class="level-pill ${lvl}">${lvlLabel}</span>`;
    }
  }

  return `
    <div class="player-card ${tierClass}" onclick="togglePlayer('${p.name}', ${p.row}, '${p.sport}')" id="card-${rank}">
      <div class="player-card-top">
        <div class="player-left">
          <div style="display:flex;flex-direction:column;align-items:center;min-width:28px;gap:1px">
            <div class="rank-badge">${rank}</div>
            ${rankChange > 0
              ? `<span style="color:var(--green-text);font-size:9px;font-family:var(--font-mono);line-height:1.2">▲${rankChange}</span>`
              : rankChange < 0
              ? `<span style="color:var(--red);font-size:9px;font-family:var(--font-mono);line-height:1.2">▼${Math.abs(rankChange)}</span>`
              : `<span style="color:var(--gray2);font-size:9px;font-family:var(--font-mono);line-height:1.2;opacity:0.4">—</span>`
            }
          </div>
          <div class="player-info">
            <div class="player-name">
              ${p.name}
              ${p.cardCompany && p.cardCompany !== 'Bowman' ? `<span class="license-icon" title="Personal license: ${p.cardCompany}">◆</span>` : ''}
            </div>
            <div class="player-meta">
              <span class="player-team">${p.team || ''}</span>
              <span class="player-pos">${p.position || ''}</span>
              ${levelPill}
              ${p.draftEligible ? `<span class="draft-pill">${p.draftEligible}</span>` : ''}
              <span class="tier-pill ${tierClass}">${
                p.tier === 'STRONG BUY'    ? '▲ Strong buy' :
                p.tier === 'BUY CANDIDATE' ? '● Buy candidate' :
                p.tier === 'WATCHLIST'     ? '■ Watchlist' : '— Monitor'
              }</span>
            </div>
          </div>
        </div>
        <div class="player-right">
          <div class="score-display" style="font-size:26px;font-weight:600;letter-spacing:-0.5px;color:${
            p.tier === 'STRONG BUY' || p.tier === 'BUY CANDIDATE' ? 'var(--green)' :
            p.tier === 'WATCHLIST' ? 'var(--amber)' : 'var(--gray)'
          }">${p.score || 0}</div>
          ${scoreChangeHtml}
        </div>
      </div>

      <div class="sparkline-container">
        <canvas id="spark-${rank}" width="400" height="72"></canvas>
      </div>

      <div class="mini-bars">
        ${['s1Vegas','s2Usage','s3Transactions','s4Reporter','s5Prospects','s6PSA','s7Search'].map(k => {
          const v = parseFloat(p[k]) || 0;
          const col = v >= 9 ? '#34d399' : v >= 7 ? '#fcd34d' : v >= 4 ? '#93c5fd' : 'rgba(100,116,139,0.2)';
          return `<div class="mini-bar-wrap"><div class="mini-bar" style="background:${col}"></div></div>`;
        }).join('')}
      </div>

      <div class="player-detail ${isExpanded ? 'open' : ''}" id="detail-${p.name.replace(/[^a-zA-Z0-9]/g,'_')}">
        <div class="signal-bars" id="bars-${rank}" style="margin-bottom:12px"></div>
        <div class="detail-signals">
          ${renderSignalGrid(p)}
        </div>
        ${(p.tier === 'WATCHLIST' || p.tier === 'BUY CANDIDATE' || p.tier === 'STRONG BUY') ? `
        <div class="card-suggestions" id="suggestions-${rank}">
          ${renderCardSuggestions(p)}
        </div>` : ''}
        <button class="brief-btn" onclick="generateBrief(event, '${p.name}', ${p.row}, '${p.sport}')" id="brief-btn-${rank}">
          <span class="btn-icon">⚡</span>
          Generate AI Brief
        </button>
        <div class="brief-output" id="brief-output-${rank}"></div>
      </div>
    </div>
  `;
}

function renderCardSuggestions(p) {
  const playerName = p.name || '';
  const raw = p.cardSuggestions || p.card_suggestions;
  if (!raw) {
    return `<div class="cs-header">CARD TARGETS</div><div class="cs-empty">Not yet generated — run generateAllCardSuggestions in Apps Script</div>`;
  }
  let data;
  try { data = typeof raw === 'string' ? JSON.parse(raw) : raw; } catch(e) {
    return `<div class="cs-header">CARD TARGETS</div><div class="cs-empty">Suggestions unavailable</div>`;
  }
  const tiers = [
    { key: 'low', label: 'LOW  <$25', cls: 'low' },
    { key: 'mid', label: 'MID  $25-$100', cls: 'mid' },
    { key: 'high', label: 'HIGH  $100-$300', cls: 'high' }
  ];
  const licenseNote = p.cardCompany && p.cardCompany !== 'Bowman'
    ? `<div style="padding:6px 12px;font-size:10px;color:#f59e0b;border-bottom:1px solid rgba(255,255,255,0.05)">◆ ${p.cardCompany} exclusive</div>` : '';
  const draftNote = p.draftEligible
    ? `<div style="padding:4px 12px;font-size:10px;color:#a5b4fc;border-bottom:1px solid rgba(255,255,255,0.05)">Draft eligible: ${p.draftEligible}</div>` : '';
  const tierBlocks = tiers.map(t => {
    const cards = data[t.key] || [];
    if (!cards.length) return '';
    const rows = cards.map(c => {
      const query = encodeURIComponent((c.card || '') + ' ' + playerName);
      const ebayUrl = 'https://www.ebay.com/sch/i.html?_nkw=' + query + '&_sop=1&LH_Auction=1';
      return `<div class="cs-card-row" onclick="window.open('${ebayUrl}','_blank')" style="cursor:pointer">
        <span class="cs-card-name" style="text-decoration:underline;text-decoration-color:rgba(255,255,255,0.2)">${c.card||''}</span>
        <span class="cs-card-price">${c.price||''}</span>
        <span class="cs-card-qty">${c.qty||''}</span>
      </div>`;
    }).join('');
    return `<div class="cs-tier-block"><div class="cs-tier-label ${t.cls}">${t.label}</div>${rows}</div>`;
  }).join('');
  const now = new Date();
  const gen = data.generated ? new Date(data.generated) : null;
  const daysOld = gen ? Math.floor((now-gen)/(1000*60*60*24)) : null;
  const freshness = daysOld === 0 ? 'today' : daysOld === 1 ? 'yesterday' : daysOld > 1 ? daysOld+'d ago' : '';
  const genDate = data.generated ? `<span style="float:right;font-weight:400;opacity:0.5">${freshness}</span>` : '';
  return `<div class="cs-header">CARD TARGETS ${genDate}</div>${licenseNote}${draftNote}${tierBlocks||'<div class="cs-empty">No suggestions available</div>'}`;
}

function getSignalColors(val, isNeg) {
  if (isNeg) {
    if (val <= 0) return { bg: 'rgba(100,116,139,0.1)', text: '#94a3b8', border: 'rgba(100,116,139,0.2)' };
    if (val >= 15) return { bg: 'rgba(220,38,38,0.18)', text: '#fca5a5', border: 'rgba(252,165,165,0.4)' };
    return { bg: 'rgba(217,119,6,0.18)', text: '#fcd34d', border: 'rgba(252,211,77,0.35)' };
  }
  if (val >= 9) return { bg: 'rgba(16,185,129,0.18)', text: '#34d399', border: 'rgba(52,211,153,0.4)' };
  if (val >= 7) return { bg: 'rgba(245,158,11,0.18)', text: '#fcd34d', border: 'rgba(252,211,77,0.4)' };
  if (val >= 4) return { bg: 'rgba(59,130,246,0.18)', text: '#93c5fd', border: 'rgba(147,197,253,0.4)' };
  if (val >= 1) return { bg: 'rgba(100,116,139,0.15)', text: '#94a3b8', border: 'rgba(100,116,139,0.25)' };
  return { bg: 'rgba(100,116,139,0.08)', text: '#475569', border: 'rgba(100,116,139,0.15)' };
}

function renderSignalGrid(p) {
  const signals = [
    { label: 'ODDS',     val: p.s1Vegas },
    { label: 'USAGE',    val: p.s2Usage },
    { label: 'TRANSACT', val: p.s3Transactions },
    { label: 'REPORTER', val: p.s4Reporter },
    { label: 'PROSPECT', val: p.s5Prospects },
    { label: 'PSA VOL',  val: p.s6PSA },
    { label: 'SOCIAL',   val: p.s7Search },
    { label: 'NEG SIG',  val: -(p.negSignals || 0) },
  ];
  return signals.map(s => {
    const val = parseFloat(s.val) || 0;
    const isNeg = s.label === 'NEG SIG';
    const display = isNeg ? Math.abs(val) : val;
    const c = getSignalColors(display, isNeg);
    return `<div class="signal-row" style="background:${c.bg};border:1px solid ${c.border};border-radius:6px;padding:5px 10px;margin-bottom:3px">
      <span class="signal-name" style="color:${c.text};opacity:0.8">${s.label}</span>
      <span class="signal-score" style="color:${c.text};font-weight:600">${display}</span>
    </div>`;
  }).join('');
}

function getHistoryForPlayer(name) { return state.history[name] || []; }

function drawSparkline(canvasId, historyData) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.offsetWidth * 2;
  const H = canvas.offsetHeight * 2;
  canvas.width = W; canvas.height = H;
  ctx.clearRect(0, 0, W, H);
  if (historyData.length < 2) {
    ctx.strokeStyle = 'rgba(100,116,139,0.3)'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0, H/2); ctx.lineTo(W, H/2); ctx.stroke();
    return;
  }
  const scores = historyData.map(d => d.score);
  const minS = Math.min(...scores); const maxS = Math.max(...scores); const range = maxS - minS || 1;
  const points = historyData.map((d, i) => ({ x: (i/(historyData.length-1))*W, y: H-((d.score-minS)/range)*(H*0.8)-H*0.1 }));
  const grad = ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'rgba(37,99,235,0.3)'); grad.addColorStop(1,'rgba(37,99,235,0)');
  ctx.beginPath(); ctx.moveTo(points[0].x,H);
  points.forEach(p => ctx.lineTo(p.x,p.y));
  ctx.lineTo(points[points.length-1].x,H); ctx.closePath();
  ctx.fillStyle = grad; ctx.fill();
  ctx.beginPath(); ctx.moveTo(points[0].x,points[0].y);
  points.forEach(p => ctx.lineTo(p.x,p.y));
  ctx.strokeStyle = '#2563eb'; ctx.lineWidth = 3; ctx.lineJoin = 'round'; ctx.stroke();
  const last = points[points.length-1];
  ctx.beginPath(); ctx.arc(last.x,last.y,5,0,Math.PI*2); ctx.fillStyle='#2563eb'; ctx.fill();
}

function drawSignalBars(containerId, p) {
  const container = document.getElementById(containerId);
  if (!container) return;
  const signals = [
    { label: 'S1', val: parseFloat(p.s1Vegas)||0 },
    { label: 'S2', val: parseFloat(p.s2Usage)||0 },
    { label: 'S3', val: parseFloat(p.s3Transactions)||0 },
    { label: 'S4', val: parseFloat(p.s4Reporter)||0 },
    { label: 'S5', val: parseFloat(p.s5Prospects)||0 },
    { label: 'S6', val: parseFloat(p.s6PSA)||0 },
    { label: 'S7', val: parseFloat(p.s7Search)||0 },
  ];
  container.innerHTML = signals.map(s => {
    const pct = Math.max(1,(s.val/10)*100);
    const color = s.val>=9?'#34d399':s.val>=7?'#fcd34d':s.val>=4?'#93c5fd':'rgba(100,116,139,0.35)';
    return `<div class="signal-bar-wrap">
      <div class="signal-bar-label">${s.label}</div>
      <div class="signal-bar-track"><div class="signal-bar" style="width:${pct}%;background:${color}"></div></div>
      <div class="signal-bar-value">${s.val>0?s.val:''}</div>
    </div>`;
  }).join('');
}

async function togglePlayer(name, row, sport) {
  const detailId = 'detail-' + name.replace(/[^a-zA-Z0-9]/g,'_');
  const detail = document.getElementById(detailId);
  if (!detail) return;
  if (state.expandedPlayer === name) {
    state.expandedPlayer = null; detail.classList.remove('open'); return;
  }
  state.expandedPlayer = name; detail.classList.add('open');
  if (!state.history[name]) {
    try {
      const res = await fetchAPI('getHistory', { player: name, sport });
      state.history[name] = res.history || [];
      renderPlayerList();
    } catch(e) {}
  }
}

async function generateBrief(event, playerName, row, sport) {
  event.stopPropagation(); event.preventDefault();
  const btn = event.currentTarget;
  if (btn.disabled) return;
  btn.disabled = true;
  btn.innerHTML = '<span class="btn-icon">⏳</span> Generating brief...';

  const players = state.data[sport] || [];
  const player = players.find(p => p.name === playerName);

  if (!player) {
    showToast('Player data not found', 'error');
    btn.disabled = false; btn.innerHTML = '<span class="btn-icon">⚡</span> Generate AI Brief'; return;
  }

  if (player.cachedBrief) {
    const today = new Date().toISOString().split('T')[0];
    const parts = player.cachedBrief.split('|BRIEF|');
    if (parts.length === 2 && parts[0] === today) {
      showBriefModal(playerName, player, parts[1], true);
      btn.disabled = false; btn.innerHTML = '<span class="btn-icon">✓</span> Brief Generated'; return;
    }
  }

  const level = player.level ? ` (${player.level})` : '';
  const scoreChangeStr = player.scoreChange > 0 ? `+${player.scoreChange}` : `${player.scoreChange}`;
  const signalContext = [];
  if (player.s1Vegas >= 5) signalContext.push(`S1 Odds (${player.s1Vegas}/10)`);
  if (player.s2Usage >= 5) signalContext.push(`S2 Usage (${player.s2Usage}/10)`);
  if (player.s3Transactions >= 5) signalContext.push(`S3 Transactions (${player.s3Transactions}/10)`);
  if (player.s4Reporter >= 5) signalContext.push(`S4 Reporter (${player.s4Reporter}/10)`);
  if (player.s5Prospects >= 5) signalContext.push(`S5 Prospects (${player.s5Prospects}/10)`);
  if (player.s6PSA >= 5) signalContext.push(`S6 PSA (${player.s6PSA}/10)`);
  if (player.s7Search >= 5) signalContext.push(`S7 Social (${player.s7Search}/10)`);

  const sportCalendar = {
    NFL: 'May 2026 NFL offseason. 2026 NFL Draft completed April 23-25. OTAs begin late May.',
    MLB: 'May 2026, approximately 30 games into the 2026 MLB regular season.',
    NBA: 'May 2026 NBA Playoffs underway.'
  };

  const prompt = `You are a sports card investment analyst. Write a specific, actionable intelligence brief for ${playerName}.

PLAYER: ${playerName} | Sport: ${sport} | Team: ${player.team}${level} | Position: ${player.position}
Score: ${player.score}/100 | Tier: ${player.tier} | Score Change: ${scoreChangeStr}
Active signals: ${signalContext.join(', ') || 'None significant'}
Calendar: ${sportCalendar[sport] || ''}

Search for current facts first. Write five sections: OPPORTUNITY SUMMARY, SIGNAL DRIVERS, CARD MARKET CONTEXT, RISK FACTORS, VERDICT & TIMING.`;

  try {
    const briefUrl = new URL(API_URL);
    briefUrl.searchParams.set('action', 'generateBrief');
    briefUrl.searchParams.set('prompt', prompt);
    briefUrl.searchParams.set('sport', sport);
    briefUrl.searchParams.set('row', row);
    const response = await fetch(briefUrl.toString(), { method: 'GET' });
    const data = await response.json();
    const briefText = data.brief || data.error || 'Unable to generate brief.';
    showBriefModal(playerName, player, briefText, false);
    btn.innerHTML = '<span class="btn-icon">✓</span> Brief Generated';
    btn.disabled = false;
  } catch(err) {
    showToast('Failed to generate brief', 'error');
    btn.disabled = false;
    btn.innerHTML = '<span class="btn-icon">⚡</span> Generate AI Brief';
  }
}

function showBriefModal(playerName, player, briefText, cached) {
  const modal = document.getElementById('briefModal');
  document.getElementById('briefModalTitle').textContent = '⚡ AI Brief — ' + playerName;
  document.getElementById('briefModalMeta').textContent = (player.sport||state.sport) + ' · ' + player.team + ' · ' + player.position + ' · Score: ' + player.score + (cached ? ' · (cached)' : '');
  function linkify(text) {
    const escaped = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    return escaped.replace(/(https?:\/\/[^\s<]+)/g, url => {
      const clean = url.replace(/[.,;:)]+$/,'');
      return `<a href="${clean}" target="_blank" rel="noopener" style="color:#7FB3D3;text-decoration:underline;word-break:break-all;">${clean}</a>`;
    });
  }
  const sourceSplit = briefText.split('\n---\nSOURCES:\n');
  const mainText = sourceSplit[0];
  let bodyHTML = linkify(mainText);
  if (sourceSplit.length > 1) {
    bodyHTML += '<div style="margin-top:16px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.1);"><div style="color:#7FB3D3;font-size:11px;font-weight:700;margin-bottom:8px;">SOURCES</div>' + linkify(sourceSplit[1]) + '</div>';
  }
  document.getElementById('briefModalBody').innerHTML = '<pre style="white-space:pre-wrap;margin:0;font-family:inherit">' + bodyHTML + '</pre>';
  modal.classList.add('visible');
}

function setPipeline(pipeline) {
  state.pipeline = pipeline;
  state.expandedPlayer = null;
  state.pageLimit = 20;
  state.view = 'all';

  // Update active pill
  document.querySelectorAll('.pipe-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('pipe-' + pipeline);
  if (btn) btn.classList.add('active');

  // For NFL NCAA FB views, load if not cached
  if (state.sport === 'NFL' && pipeline !== 'nfl') {
    if (!state.data['NCAA FB'] || state.data['NCAA FB'].length === 0) {
      fetchAPI('getTopPlayers', { sport: 'NCAA FB', limit: 200, draftYear: '' })
        .then(res => { state.data['NCAA FB'] = res.players || []; updateSummaryStrip(); renderPlayerList(); })
        .catch(() => renderPlayerList());
      return;
    }
  }

  // For MLB pipeline views, data is already in state.data['MLB'] filtered by level
  updateSummaryStrip();
  renderPlayerList();
}

function setView(view) {
  if (state.view === view) { state.view = 'all'; state.pageLimit = 20; updateSummaryStrip(); renderPlayerList(); return; }
  state.view = view; state.pageLimit = 20; updateSummaryStrip(); renderPlayerList();
}

function updateSourceIndicator() {
  if (!state.sources) return;
  const dot = document.getElementById('sourceDot');
  const text = document.getElementById('sourceText');
  if (state.sources.hasIssues) {
    dot.className = 'source-dot warning';
    text.textContent = state.sources.issueCount + ' ISSUE' + (state.sources.issueCount > 1 ? 'S' : '');
  } else {
    dot.className = 'source-dot';
    text.textContent = 'SOURCES OK';
  }
}

function renderSourceModal() {
  if (!state.sources) return;
  const list = document.getElementById('sourceList');
  const primarySources = (state.sources.sources || []).filter(s => s.type === 'PRIMARY');
  list.innerHTML = primarySources.map(s => `
    <div class="source-item">
      <div class="source-item-left">
        <div class="source-item-name">${s.name}</div>
        <div class="source-item-signal">${s.signal}${s.daysOnBackup ? ' · '+s.daysOnBackup+'d on backup' : ''}</div>
      </div>
      <span class="source-status-badge ${s.status.toLowerCase().replace(' ','-')}">${s.status}</span>
    </div>`).join('');
}

function openSourceModal() { renderSourceModal(); document.getElementById('sourceModal').classList.add('visible'); }
function closeModal() { document.getElementById('sourceModal').classList.remove('visible'); }

function updateBadges() {
  ['NFL','MLB','NBA'].forEach(sport => {
    const players = state.data[sport] || [];
    const hot = players.filter(p => p.tier === 'STRONG BUY' || p.tier === 'BUY CANDIDATE').length;
    const badge = document.getElementById('badge-' + sport);
    if (badge) { badge.textContent = hot; badge.style.display = hot > 0 ? 'block' : 'none'; }
  });
}

function updateLastUpdated() {
  const el = document.getElementById('lastUpdated');
  const now = new Date();
  el.textContent = 'Updated ' + now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function getTierClass(tier) {
  if (!tier) return 'monitor';
  const t = tier.toLowerCase();
  if (t === 'strong buy') return 'strong-buy';
  if (t === 'buy candidate') return 'buy-candidate';
  if (t === 'watchlist') return 'watchlist';
  return 'monitor';
}

function showLoading(text='Loading...') { document.getElementById('loadingText').textContent=text; document.getElementById('loadingOverlay').classList.add('visible'); }
function hideLoading() { document.getElementById('loadingOverlay').classList.remove('visible'); }
function showToast(msg, type='') { const t=document.getElementById('toast'); t.textContent=msg; t.className='toast visible '+type; setTimeout(()=>t.classList.remove('visible'),3000); }
function renderError() { document.getElementById('playerList').innerHTML='<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">Connection Error</div><div class="empty-text">Could not reach Google Sheets.</div></div>'; }

document.getElementById('sourceModal').addEventListener('click', function(e) { if(e.target===this) closeModal(); });
function closeBriefModal(event) { if(event.target===document.getElementById('briefModal')) document.getElementById('briefModal').classList.remove('visible'); }
</script>

<div class="brief-modal-overlay" id="briefModal" onclick="closeBriefModal(event)">
  <div class="brief-modal">
    <div class="brief-modal-header">
      <div>
        <div class="brief-modal-title" id="briefModalTitle">AI Brief</div>
        <div class="brief-modal-meta" id="briefModalMeta"></div>
      </div>
      <button class="brief-modal-close" onclick="document.getElementById('briefModal').classList.remove('visible')">✕</button>
    </div>
    <div class="brief-modal-body" id="briefModalBody"></div>
  </div>
</div>

</body>
