<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0e1a">
<title>SCOSF — Card Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0a0e1a;
    --navy2: #111827;
    --navy3: #1a2235;
    --border: #1e2d45;
    --blue: #2563eb;
    --blue-glow: rgba(37,99,235,0.3);
    --teal: #0891b2;
    --green: #059669;
    --green-light: #d1fae5;
    --green-text: #10b981;
    --amber: #d97706;
    --amber-light: #fef3c7;
    --red: #dc2626;
    --red-light: #fee2e2;
    --blue-light: #dbeafe;
    --gray: #94a3b8;
    --gray2: #64748b;
    --white: #f8fafc;
    --font-display: 'Bebas Neue', sans-serif;
    --font-body: 'DM Sans', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--navy);
    color: var(--white);
    font-family: var(--font-body);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── BACKGROUND TEXTURE ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 20% 0%, rgba(37,99,235,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 100%, rgba(8,145,178,0.06) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── HEADER ── */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,14,26,0.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
  }

  .header-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    max-width: 480px;
    margin: 0 auto;
  }

  .logo {
    font-family: var(--font-display);
    font-size: 26px;
    letter-spacing: 2px;
    color: var(--white);
    line-height: 1;
  }

  .logo span { color: var(--blue); }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .source-indicator {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-family: var(--font-mono);
    color: var(--gray2);
    cursor: pointer;
  }

  .source-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--green-text);
    animation: pulse-dot 2s infinite;
  }

  .source-dot.warning { background: var(--amber); }
  .source-dot.error { background: var(--red); }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .refresh-btn {
    background: none;
    border: none;
    color: var(--gray);
    cursor: pointer;
    padding: 6px;
    border-radius: 8px;
    transition: color 0.2s, background 0.2s;
    font-size: 16px;
  }

  .refresh-btn:hover { color: var(--white); background: var(--navy3); }
  .refresh-btn.spinning { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── SPORT TABS ── */
  .sport-tabs {
    display: flex;
    gap: 0;
    padding: 12px 16px 0;
    max-width: 480px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  .sport-tab {
    flex: 1;
    padding: 10px 8px;
    text-align: center;
    font-family: var(--font-display);
    font-size: 18px;
    letter-spacing: 1.5px;
    color: var(--gray2);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    position: relative;
  }

  .sport-tab.active {
    color: var(--white);
    border-bottom-color: var(--blue);
  }

  .sport-tab .badge {
    position: absolute;
    top: 4px;
    right: 8px;
    background: var(--green-text);
    color: var(--navy);
    font-family: var(--font-mono);
    font-size: 9px;
    font-weight: 500;
    padding: 1px 4px;
    border-radius: 4px;
    line-height: 1.4;
  }

  /* ── TIMEFRAME SELECTOR ── */
  .timeframe-bar {
    padding: 12px 16px;
    max-width: 480px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  .timeframe-scroll {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }

  .timeframe-scroll::-webkit-scrollbar { display: none; }

  .tf-btn {
    flex-shrink: 0;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--navy2);
    color: var(--gray);
    font-family: var(--font-mono);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .tf-btn.active {
    background: var(--blue);
    border-color: var(--blue);
    color: var(--white);
  }

  /* ── SUMMARY CARDS ── */
  .summary-strip {
    display: flex;
    gap: 8px;
    padding: 0 16px 12px;
    max-width: 480px;
    margin: 0 auto;
    overflow-x: auto;
    scrollbar-width: none;
    position: relative;
    z-index: 1;
  }

  .summary-strip::-webkit-scrollbar { display: none; }

  .summary-card {
    flex-shrink: 0;
    background: var(--navy2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    min-width: 90px;
    text-align: center;
  }

  .summary-card .sc-value {
    font-family: var(--font-display);
    font-size: 28px;
    line-height: 1;
    margin-bottom: 3px;
  }

  .summary-card .sc-label {
    font-size: 10px;
    font-family: var(--font-mono);
    color: var(--gray2);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .summary-card.strong-buy .sc-value { color: var(--green-text); }
  .summary-card.buy-candidate .sc-value { color: var(--blue); }
  .summary-card.watchlist .sc-value { color: var(--amber); }
  .summary-card.total .sc-value { color: var(--white); }

  /* ── PLAYER LIST ── */
  .list-container {
    padding: 0 16px 100px;
    max-width: 480px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  .list-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .list-title {
    font-family: var(--font-display);
    font-size: 20px;
    letter-spacing: 1px;
    color: var(--gray);
  }

  .list-count {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--gray2);
  }

  /* ── PLAYER CARD ── */
  .player-card {
    background: var(--navy2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .player-card::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    border-radius: 3px 0 0 3px;
  }

  .player-card.strong-buy::before { background: var(--green-text); }
  .player-card.buy-candidate::before { background: var(--blue); }
  .player-card.watchlist::before { background: var(--amber); }
  .player-card.monitor::before { background: var(--border); }

  .player-card:active { transform: scale(0.98); }

  .player-card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .player-left {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
    min-width: 0;
  }

  .rank-badge {
    font-family: var(--font-display);
    font-size: 22px;
    color: var(--gray2);
    min-width: 28px;
    line-height: 1;
  }

  .player-info { min-width: 0; flex: 1; }

  .player-name {
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 15px;
    color: var(--white);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 3px;
  }

  .player-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }

  .player-team {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--gray2);
  }

  .player-pos {
    font-family: var(--font-mono);
    font-size: 10px;
    background: var(--navy3);
    color: var(--gray);
    padding: 1px 6px;
    border-radius: 4px;
  }

  .tier-pill {
    font-family: var(--font-mono);
    font-size: 9px;
    font-weight: 500;
    padding: 2px 7px;
    border-radius: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .tier-pill.strong-buy { background: rgba(16,185,129,0.15); color: var(--green-text); border: 1px solid rgba(16,185,129,0.3); }
  .tier-pill.buy-candidate { background: rgba(37,99,235,0.15); color: #60a5fa; border: 1px solid rgba(37,99,235,0.3); }
  .tier-pill.watchlist { background: rgba(217,119,6,0.15); color: #fbbf24; border: 1px solid rgba(217,119,6,0.3); }
  .tier-pill.monitor { background: rgba(100,116,139,0.15); color: var(--gray); border: 1px solid rgba(100,116,139,0.2); }

  .player-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
    margin-left: 8px;
  }

  .score-display {
    font-family: var(--font-display);
    font-size: 32px;
    line-height: 1;
    color: var(--white);
  }

  .score-display.strong-buy { color: var(--green-text); }
  .score-display.buy-candidate { color: #60a5fa; }
  .score-display.watchlist { color: #fbbf24; }

  .rank-change {
    display: flex;
    align-items: center;
    gap: 3px;
    font-family: var(--font-mono);
    font-size: 11px;
  }

  .rank-change.up { color: var(--green-text); }
  .rank-change.down { color: var(--red); }
  .rank-change.flat { color: var(--gray2); }

  /* ── SPARKLINE ── */
  .sparkline-container {
    height: 36px;
    margin-top: 4px;
    position: relative;
  }

  .sparkline-container canvas {
    width: 100%;
    height: 100%;
  }

  /* ── SIGNAL BARS ── */
  .signal-bars {
    display: flex;
    gap: 3px;
    margin-top: 8px;
    align-items: flex-end;
    height: 20px;
  }

  .signal-bar-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    height: 100%;
    justify-content: flex-end;
  }

  .signal-bar {
    width: 100%;
    border-radius: 2px;
    background: var(--blue);
    transition: height 0.3s ease;
    min-height: 2px;
  }

  .signal-label {
    font-family: var(--font-mono);
    font-size: 8px;
    color: var(--gray2);
  }

  /* ── EXPANDED PLAYER DETAIL ── */
  .player-detail {
    display: none;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }

  .player-detail.open { display: block; }

  .detail-signals {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-bottom: 12px;
  }

  .signal-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--navy3);
    border-radius: 8px;
    padding: 7px 10px;
  }

  .signal-name {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--gray);
  }

  .signal-score {
    font-family: var(--font-display);
    font-size: 18px;
    color: var(--white);
  }

  .signal-score.high { color: var(--green-text); }
  .signal-score.mid { color: #fbbf24; }
  .signal-score.low { color: var(--gray2); }

  /* ── BRIEF BUTTON ── */
  .brief-btn {
    width: 100%;
    padding: 10px;
    background: linear-gradient(135deg, rgba(37,99,235,0.2), rgba(8,145,178,0.2));
    border: 1px solid rgba(37,99,235,0.4);
    border-radius: 8px;
    color: #60a5fa;
    font-family: var(--font-body);
    font-weight: 500;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
  }

  .brief-btn:hover {
    background: linear-gradient(135deg, rgba(37,99,235,0.35), rgba(8,145,178,0.35));
    border-color: rgba(37,99,235,0.7);
  }

  .brief-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .brief-btn .btn-icon { font-size: 14px; }

  /* ── BRIEF OUTPUT ── */
  .brief-output {
    display: none;
    margin-top: 10px;
    padding: 12px;
    background: var(--navy3);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 12px;
    line-height: 1.6;
    color: var(--gray);
    white-space: pre-wrap;
    max-height: 300px;
    overflow-y: auto;
  }

  .brief-output.visible { display: block; }

  /* ── LOADING STATE ── */
  .loading-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,14,26,0.85);
    z-index: 200;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
  }

  .loading-overlay.visible { display: flex; }

  .loader {
    width: 40px;
    height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  .loading-text {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--gray);
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--gray2);
  }

  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-title { font-family: var(--font-display); font-size: 22px; margin-bottom: 8px; color: var(--gray); }
  .empty-text { font-size: 13px; line-height: 1.6; }

  /* ── SOURCE HEALTH MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,14,26,0.9);
    z-index: 150;
    align-items: flex-end;
    justify-content: center;
    padding: 0;
  }

  .modal-overlay.visible { display: flex; }

  .modal {
    background: var(--navy2);
    border: 1px solid var(--border);
    border-radius: 20px 20px 0 0;
    padding: 20px 16px 40px;
    width: 100%;
    max-width: 480px;
    max-height: 80vh;
    overflow-y: auto;
    animation: slideUp 0.3s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .modal-title {
    font-family: var(--font-display);
    font-size: 22px;
    letter-spacing: 1px;
  }

  .modal-close {
    background: var(--navy3);
    border: none;
    color: var(--gray);
    width: 32px;
    height: 32px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .source-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    background: var(--navy3);
    border-radius: 8px;
    margin-bottom: 6px;
  }

  .source-item-left { flex: 1; min-width: 0; }

  .source-item-name {
    font-weight: 500;
    font-size: 13px;
    margin-bottom: 2px;
  }

  .source-item-signal {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--gray2);
  }

  .source-status-badge {
    font-family: var(--font-mono);
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 8px;
    font-weight: 500;
  }

  .source-status-badge.active { background: rgba(16,185,129,0.15); color: var(--green-text); }
  .source-status-badge.backup { background: rgba(217,119,6,0.15); color: #fbbf24; }
  .source-status-badge.down { background: rgba(220,38,38,0.15); color: #f87171; }
  .source-status-badge.standby { background: rgba(100,116,139,0.1); color: var(--gray2); }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(10,14,26,0.95);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    display: flex;
    z-index: 100;
  }

  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 8px 14px;
    cursor: pointer;
    transition: color 0.2s;
    color: var(--gray2);
    border: none;
    background: none;
  }

  .nav-item.active { color: var(--blue); }
  .nav-icon { font-size: 20px; margin-bottom: 3px; }
  .nav-label { font-family: var(--font-mono); font-size: 9px; text-transform: uppercase; letter-spacing: 0.5px; }

  /* ── ERROR TOAST ── */
  .toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--navy3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 16px;
    font-size: 13px;
    color: var(--gray);
    opacity: 0;
    transition: all 0.3s;
    z-index: 300;
    white-space: nowrap;
    pointer-events: none;
  }

  .toast.visible {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .toast.error { border-color: rgba(220,38,38,0.4); color: #f87171; }
  .toast.success { border-color: rgba(16,185,129,0.4); color: var(--green-text); }

  /* ── LAST UPDATED ── */
  .last-updated {
    text-align: center;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--gray2);
    padding: 8px 0 4px;
    position: relative;
    z-index: 1;
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<!-- Loading Overlay -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loader"></div>
  <div class="loading-text" id="loadingText">Loading intelligence...</div>
</div>

<!-- Source Health Modal -->
<div class="modal-overlay" id="sourceModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">SOURCE HEALTH</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="sourceList"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Header -->
<header>
  <div class="header-inner">
    <div class="logo">SCO<span>SF</span></div>
    <div class="header-right">
      <div class="source-indicator" onclick="openSourceModal()" id="sourceIndicator">
        <div class="source-dot" id="sourceDot"></div>
        <span id="sourceText">SOURCES</span>
      </div>
      <button class="refresh-btn" id="refreshBtn" onclick="loadData(true)">↻</button>
    </div>
  </div>
</header>

<!-- Sport Tabs -->
<div class="sport-tabs">
  <div class="sport-tab active" onclick="switchSport('NFL')" id="tab-NFL">
    NFL
    <span class="badge" id="badge-NFL" style="display:none"></span>
  </div>
  <div class="sport-tab" onclick="switchSport('MLB')" id="tab-MLB">
    MLB
    <span class="badge" id="badge-MLB" style="display:none"></span>
  </div>
  <div class="sport-tab" onclick="switchSport('NBA')" id="tab-NBA">
    NBA
    <span class="badge" id="badge-NBA" style="display:none"></span>
  </div>
</div>

<!-- Timeframe Bar -->
<div class="timeframe-bar">
  <div class="timeframe-scroll">
    <button class="tf-btn active" onclick="setTimeframe(7, this)">7D</button>
    <button class="tf-btn" onclick="setTimeframe(14, this)">14D</button>
    <button class="tf-btn" onclick="setTimeframe(30, this)">30D</button>
    <button class="tf-btn" onclick="setTimeframe(90, this)">3M</button>
    <button class="tf-btn" onclick="setTimeframe(180, this)">6M</button>
    <button class="tf-btn" onclick="setTimeframe(365, this)">12M</button>
  </div>
</div>

<!-- Summary Strip -->
<div class="summary-strip" id="summaryStrip"></div>

<!-- Last Updated -->
<div class="last-updated" id="lastUpdated"></div>

<!-- Player List -->
<div class="list-container">
  <div class="list-header">
    <div class="list-title" id="listTitle">TOP PLAYERS</div>
    <div class="list-count" id="listCount"></div>
  </div>
  <div id="playerList"></div>
</div>

<!-- Bottom Nav -->
<nav class="bottom-nav">
  <button class="nav-item active" onclick="setView('rankings')">
    <div class="nav-icon">📊</div>
    <div class="nav-label">Rankings</div>
  </button>
  <button class="nav-item" onclick="setView('watchlist')">
    <div class="nav-icon">👁</div>
    <div class="nav-label">Watchlist</div>
  </button>
  <button class="nav-item" onclick="setView('strong')">
    <div class="nav-icon">🔥</div>
    <div class="nav-label">Strong Buy</div>
  </button>
  <button class="nav-item" onclick="setView('all')">
    <div class="nav-icon">☰</div>
    <div class="nav-label">All</div>
  </button>
</nav>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────
const API_URL = 'https://script.google.com/macros/s/AKfycbxbJfBx6Wd4rbAJFQTmRx11YNHAL8LxI3EKp6mKSLwhh9pAF_tMqFFthhuamqlLkLKl/exec';
const ANTHROPIC_API_URL = 'https://api.anthropic.com/v1/messages';

// ── STATE ─────────────────────────────────────────────────────────────────
let state = {
  sport: 'NFL',
  timeframe: 7,
  view: 'rankings',
  data: { NFL: null, MLB: null, NBA: null },
  history: {},
  sources: null,
  summary: null,
  expandedPlayer: null,
  loading: false
};

// ── INIT ──────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  loadData(false);
});

// ── DATA LOADING ──────────────────────────────────────────────────────────
async function loadData(showLoader = true) {
  if (state.loading) return;
  state.loading = true;

  const refreshBtn = document.getElementById('refreshBtn');
  refreshBtn.classList.add('spinning');

  if (showLoader) showLoading('Fetching latest scores...');

  try {
    // Load summary and current sport in parallel
    const [summaryRes, playersRes] = await Promise.all([
      fetchAPI('getDashboardSummary'),
      fetchAPI('getTopPlayers', { sport: state.sport, limit: 20 })
    ]);

    state.summary = summaryRes;
    state.data[state.sport] = playersRes.players || [];

    // Load other sports in background
    loadOtherSports();

    // Load source health
    fetchAPI('getSourceHealth').then(res => {
      state.sources = res;
      updateSourceIndicator();
      if (state.sport) renderSourceModal();
    });

    updateSummaryStrip();
    updateBadges();
    renderPlayerList();
    updateLastUpdated();

  } catch(err) {
    showToast('Failed to load data. Check connection.', 'error');
    renderError();
  } finally {
    state.loading = false;
    refreshBtn.classList.remove('spinning');
    hideLoading();
  }
}

async function loadOtherSports() {
  const others = ['NFL', 'MLB', 'NBA'].filter(s => s !== state.sport);
  for (const sport of others) {
    try {
      const res = await fetchAPI('getTopPlayers', { sport, limit: 20 });
      state.data[sport] = res.players || [];
      updateBadges();
    } catch(e) {}
  }
}

async function fetchAPI(action, params = {}) {
  const url = new URL(API_URL);
  url.searchParams.set('action', action);
  Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));

  const res = await fetch(url.toString(), {
    method: 'GET',
    redirect: 'follow',
  });
  if (!res.ok) throw new Error('API error: ' + res.status);
  return await res.json();
}

async function switchSport(sport) {
  state.sport = sport;
  state.expandedPlayer = null;

  // Update tabs
  document.querySelectorAll('.sport-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + sport).classList.add('active');

  if (!state.data[sport]) {
    showLoading('Loading ' + sport + ' players...');
    try {
      const res = await fetchAPI('getTopPlayers', { sport, limit: 20 });
      state.data[sport] = res.players || [];
    } catch(e) {
      showToast('Failed to load ' + sport + ' data', 'error');
    } finally {
      hideLoading();
    }
  }

  updateSummaryStrip();
  renderPlayerList();
}

// ── RENDER SUMMARY STRIP ──────────────────────────────────────────────────
function updateSummaryStrip() {
  const strip = document.getElementById('summaryStrip');
  const players = state.data[state.sport] || [];

  const strongBuy = players.filter(p => p.tier === 'STRONG BUY').length;
  const buyCandidate = players.filter(p => p.tier === 'BUY CANDIDATE').length;
  const watchlist = players.filter(p => p.tier === 'WATCHLIST').length;

  // Use summary data if available
  let total = players.length;
  if (state.summary && state.summary[state.sport]) {
    const s = state.summary[state.sport];
    total = s.total || total;
  }

  strip.innerHTML = `
    <div class="summary-card total">
      <div class="sc-value">${total}</div>
      <div class="sc-label">Tracked</div>
    </div>
    <div class="summary-card strong-buy">
      <div class="sc-value">${strongBuy}</div>
      <div class="sc-label">Strong Buy</div>
    </div>
    <div class="summary-card buy-candidate">
      <div class="sc-value">${buyCandidate}</div>
      <div class="sc-label">Buy</div>
    </div>
    <div class="summary-card watchlist">
      <div class="sc-value">${watchlist}</div>
      <div class="sc-label">Watchlist</div>
    </div>
  `;
}

// ── RENDER PLAYER LIST ────────────────────────────────────────────────────
function renderPlayerList() {
  const container = document.getElementById('playerList');
  const titleEl = document.getElementById('listTitle');
  const countEl = document.getElementById('listCount');
  let players = state.data[state.sport] || [];

  // Filter by view
  if (state.view === 'watchlist') {
    players = players.filter(p => p.tier === 'WATCHLIST' || p.tier === 'BUY CANDIDATE' || p.tier === 'STRONG BUY');
    titleEl.textContent = 'WATCHLIST & ABOVE';
  } else if (state.view === 'strong') {
    players = players.filter(p => p.tier === 'STRONG BUY' || p.tier === 'BUY CANDIDATE');
    titleEl.textContent = 'BUY SIGNALS';
  } else if (state.view === 'all') {
    titleEl.textContent = 'ALL PLAYERS';
  } else {
    titleEl.textContent = 'TOP PLAYERS';
    players = players.slice(0, 20);
  }

  // Sort by score descending
  players = [...players].sort((a, b) => (b.score || 0) - (a.score || 0));

  countEl.textContent = players.length + ' players';

  if (players.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📋</div>
        <div class="empty-title">No Players Yet</div>
        <div class="empty-text">Enter signal scores in Google Sheets to start seeing players ranked here.</div>
      </div>
    `;
    return;
  }

  container.innerHTML = players.map((p, i) => renderPlayerCard(p, i + 1)).join('');

  // Draw sparklines after render
  players.forEach((p, i) => {
    drawSparkline('spark-' + (i + 1), getHistoryForPlayer(p.name));
    drawSignalBars('bars-' + (i + 1), p);
  });
}

// ── RENDER PLAYER CARD ────────────────────────────────────────────────────
function renderPlayerCard(p, rank) {
  const tierClass = getTierClass(p.tier);
  const scoreClass = p.score >= 76 ? 'strong-buy' : p.score >= 56 ? 'buy-candidate' : p.score >= 31 ? 'watchlist' : '';
  const rankChange = p.rankChange || 0;
  const rankChangeHtml = rankChange > 0
    ? `<span class="rank-change up">▲ ${rankChange}</span>`
    : rankChange < 0
    ? `<span class="rank-change down">▼ ${Math.abs(rankChange)}</span>`
    : `<span class="rank-change flat">— 0</span>`;

  const isExpanded = state.expandedPlayer === p.name;
  const scoreChange = p.scoreChange || 0;
  const scoreChangeHtml = scoreChange > 0
    ? `<span style="color:var(--green-text);font-size:11px;font-family:var(--font-mono)">+${scoreChange}</span>`
    : scoreChange < 0
    ? `<span style="color:var(--red);font-size:11px;font-family:var(--font-mono)">${scoreChange}</span>`
    : '';

  return `
    <div class="player-card ${tierClass}" onclick="togglePlayer('${p.name}', ${p.row}, '${p.sport || state.sport}')" id="card-${rank}">
      <div class="player-card-top">
        <div class="player-left">
          <div class="rank-badge">${rank}</div>
          <div class="player-info">
            <div class="player-name">${p.name}</div>
            <div class="player-meta">
              <span class="player-team">${p.team || ''}</span>
              <span class="player-pos">${p.position || ''}</span>
              <span class="tier-pill ${tierClass}">${p.tier || 'MONITOR'}</span>
            </div>
          </div>
        </div>
        <div class="player-right">
          <div class="score-display ${scoreClass}">${p.score || 0}</div>
          ${scoreChangeHtml}
          ${rankChangeHtml}
        </div>
      </div>

      <div class="sparkline-container">
        <canvas id="spark-${rank}" width="400" height="72"></canvas>
      </div>

      <div class="signal-bars" id="bars-${rank}"></div>

      <div class="player-detail ${isExpanded ? 'open' : ''}" id="detail-${p.name.replace(/\s/g,'_')}">
        <div class="detail-signals">
          ${renderSignalGrid(p)}
        </div>
        <button class="brief-btn" onclick="generateBrief(event, '${p.name}', ${p.row}, '${p.sport || state.sport}')" id="brief-btn-${rank}">
          <span class="btn-icon">⚡</span>
          Generate AI Brief
        </button>
        <div class="brief-output" id="brief-output-${rank}"></div>
      </div>
    </div>
  `;
}

function renderSignalGrid(p) {
  const signals = [
    { label: 'VEGAS', val: p.s1Vegas },
    { label: 'USAGE', val: p.s2Usage },
    { label: 'TRANS', val: p.s3Transactions },
    { label: 'PRESS', val: p.s4Reporter },
    { label: 'PROSP', val: p.s5Prospects },
    { label: 'PSA', val: p.s6PSA },
    { label: 'SEARCH', val: p.s7Search },
    { label: 'NEG', val: -(p.negSignals || 0) },
  ];

  return signals.map(s => {
    const val = parseFloat(s.val) || 0;
    const cls = val >= 7 ? 'high' : val >= 4 ? 'mid' : 'low';
    const display = s.label === 'NEG' ? (val < 0 ? val : '0') : val;
    return `
      <div class="signal-row">
        <span class="signal-name">${s.label}</span>
        <span class="signal-score ${cls}">${display}</span>
      </div>
    `;
  }).join('');
}

// ── SPARKLINE ─────────────────────────────────────────────────────────────
function getHistoryForPlayer(name) {
  return state.history[name] || [];
}

function drawSparkline(canvasId, historyData) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;

  const ctx = canvas.getContext('2d');
  const W = canvas.offsetWidth * 2;
  const H = canvas.offsetHeight * 2;
  canvas.width = W;
  canvas.height = H;
  ctx.clearRect(0, 0, W, H);

  // Filter by timeframe
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - state.timeframe);
  const filtered = historyData.filter(d => new Date(d.date) >= cutoff);

  if (filtered.length < 2) {
    // Draw flat line placeholder
    ctx.strokeStyle = 'rgba(100,116,139,0.3)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, H / 2);
    ctx.lineTo(W, H / 2);
    ctx.stroke();
    return;
  }

  const scores = filtered.map(d => d.score);
  const minS = Math.min(...scores);
  const maxS = Math.max(...scores);
  const range = maxS - minS || 1;

  const points = filtered.map((d, i) => ({
    x: (i / (filtered.length - 1)) * W,
    y: H - ((d.score - minS) / range) * (H * 0.8) - H * 0.1
  }));

  // Gradient fill
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, 'rgba(37,99,235,0.3)');
  grad.addColorStop(1, 'rgba(37,99,235,0)');

  ctx.beginPath();
  ctx.moveTo(points[0].x, H);
  points.forEach(p => ctx.lineTo(p.x, p.y));
  ctx.lineTo(points[points.length-1].x, H);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // Line
  ctx.beginPath();
  ctx.moveTo(points[0].x, points[0].y);
  points.forEach(p => ctx.lineTo(p.x, p.y));
  ctx.strokeStyle = '#2563eb';
  ctx.lineWidth = 3;
  ctx.lineJoin = 'round';
  ctx.stroke();

  // End dot
  const last = points[points.length - 1];
  ctx.beginPath();
  ctx.arc(last.x, last.y, 5, 0, Math.PI * 2);
  ctx.fillStyle = '#2563eb';
  ctx.fill();
}

function drawSignalBars(containerId, p) {
  const container = document.getElementById(containerId);
  if (!container) return;

  const signals = [
    { label: 'S1', val: parseFloat(p.s1Vegas) || 0 },
    { label: 'S2', val: parseFloat(p.s2Usage) || 0 },
    { label: 'S3', val: parseFloat(p.s3Transactions) || 0 },
    { label: 'S4', val: parseFloat(p.s4Reporter) || 0 },
    { label: 'S5', val: parseFloat(p.s5Prospects) || 0 },
    { label: 'S6', val: parseFloat(p.s6PSA) || 0 },
    { label: 'S7', val: parseFloat(p.s7Search) || 0 },
  ];

  container.innerHTML = signals.map(s => {
    const pct = Math.max(2, (s.val / 10) * 100);
    const color = s.val >= 7 ? 'var(--green-text)' : s.val >= 4 ? '#fbbf24' : 'rgba(100,116,139,0.4)';
    return `
      <div class="signal-bar-wrap">
        <div class="signal-bar" style="height:${pct}%;background:${color}"></div>
        <div class="signal-label">${s.label}</div>
      </div>
    `;
  }).join('');
}

// ── TOGGLE PLAYER EXPAND ──────────────────────────────────────────────────
async function togglePlayer(name, row, sport) {
  const detailId = 'detail-' + name.replace(/\s/g, '_');
  const detail = document.getElementById(detailId);
  if (!detail) return;

  if (state.expandedPlayer === name) {
    state.expandedPlayer = null;
    detail.classList.remove('open');
    return;
  }

  state.expandedPlayer = name;
  detail.classList.add('open');

  // Load history for sparkline if not cached
  if (!state.history[name]) {
    try {
      const res = await fetchAPI('getHistory', { player: name, sport });
      state.history[name] = res.history || [];
      // Redraw sparklines
      renderPlayerList();
    } catch(e) {}
  }
}

// ── AI BRIEF GENERATION ───────────────────────────────────────────────────
async function generateBrief(event, playerName, row, sport) {
  event.stopPropagation();

  const btn = event.currentTarget;
  const outputId = btn.nextElementSibling.id;
  const output = document.getElementById(outputId);

  btn.disabled = true;
  btn.innerHTML = '<span class="btn-icon">⏳</span> Generating brief...';

  const players = state.data[sport] || [];
  const player = players.find(p => p.name === playerName);

  if (!player) {
    showToast('Player data not found', 'error');
    btn.disabled = false;
    btn.innerHTML = '<span class="btn-icon">⚡</span> Generate AI Brief';
    return;
  }

  const prompt = `You are a sports card investment analyst. Generate a concise one-page intelligence brief for the following player based on their current signal scores.

Player: ${playerName}
Sport: ${sport}
Team: ${player.team}
Position: ${player.position}
Composite Score: ${player.score}
Tier: ${player.tier}

Signal Scores (0-10 scale):
- Vegas Odds Shift: ${player.s1Vegas}
- Usage/Role Changes: ${player.s2Usage}
- Team Transactions: ${player.s3Transactions}
- Beat Reporter Coverage: ${player.s4Reporter}
- Hot Prospect/Call-up: ${player.s5Prospects}
- PSA Grading Volume: ${player.s6PSA}
- Search Volume Trend: ${player.s7Search}
- Negative Signals: ${player.negSignals}

Score Change: ${player.scoreChange > 0 ? '+' : ''}${player.scoreChange}
Rank Change: ${player.rankChange > 0 ? '+' : ''}${player.rankChange}

Based on these signals, provide:
1. OPPORTUNITY SUMMARY (2-3 sentences on why this player is interesting)
2. KEY SIGNALS (which signals are driving the score and what they suggest)
3. RISK FACTORS (what could go wrong or reduce card value)
4. TIMING (when to act and what catalysts to watch for)
5. VERDICT (Buy Now / Watch Closely / Hold / Avoid)

Be specific, concise, and actionable. Focus on card investment implications.`;

  try {
    const response = await fetch(ANTHROPIC_API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await response.json();
    const briefText = data.content?.[0]?.text || 'Unable to generate brief.';

    output.textContent = briefText;
    output.classList.add('visible');
    btn.innerHTML = '<span class="btn-icon">✓</span> Brief Generated';

    // Save brief to sheet in background
    fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'saveBrief', sport, row, brief: briefText })
    }).catch(() => {});

  } catch(err) {
    showToast('Failed to generate brief', 'error');
    btn.disabled = false;
    btn.innerHTML = '<span class="btn-icon">⚡</span> Generate AI Brief';
  }
}

// ── TIMEFRAME ─────────────────────────────────────────────────────────────
function setTimeframe(days, btn) {
  state.timeframe = days;
  document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderPlayerList();
}

// ── VIEW ──────────────────────────────────────────────────────────────────
function setView(view) {
  state.view = view;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  event.currentTarget.classList.add('active');
  renderPlayerList();
}

// ── SOURCE HEALTH ─────────────────────────────────────────────────────────
function updateSourceIndicator() {
  if (!state.sources) return;
  const dot = document.getElementById('sourceDot');
  const text = document.getElementById('sourceText');

  if (state.sources.hasIssues) {
    dot.className = 'source-dot warning';
    text.textContent = state.sources.issueCount + ' ISSUE' + (state.sources.issueCount > 1 ? 'S' : '');
  } else {
    dot.className = 'source-dot';
    text.textContent = 'SOURCES OK';
  }
}

function renderSourceModal() {
  if (!state.sources) return;
  const list = document.getElementById('sourceList');
  const primarySources = (state.sources.sources || []).filter(s => s.type === 'PRIMARY');

  list.innerHTML = primarySources.map(s => `
    <div class="source-item">
      <div class="source-item-left">
        <div class="source-item-name">${s.name}</div>
        <div class="source-item-signal">${s.signal}${s.daysOnBackup ? ' · ' + s.daysOnBackup + ' days on backup' : ''}</div>
      </div>
      <span class="source-status-badge ${s.status.toLowerCase().replace(' ', '-')}">${s.status}</span>
    </div>
  `).join('');
}

function openSourceModal() {
  renderSourceModal();
  document.getElementById('sourceModal').classList.add('visible');
}

function closeModal() {
  document.getElementById('sourceModal').classList.remove('visible');
}

// ── BADGES ────────────────────────────────────────────────────────────────
function updateBadges() {
  ['NFL', 'MLB', 'NBA'].forEach(sport => {
    const players = state.data[sport] || [];
    const hot = players.filter(p => p.tier === 'STRONG BUY' || p.tier === 'BUY CANDIDATE').length;
    const badge = document.getElementById('badge-' + sport);
    if (badge) {
      if (hot > 0) {
        badge.textContent = hot;
        badge.style.display = 'block';
      } else {
        badge.style.display = 'none';
      }
    }
  });
}

// ── LAST UPDATED ──────────────────────────────────────────────────────────
function updateLastUpdated() {
  const el = document.getElementById('lastUpdated');
  const now = new Date();
  el.textContent = 'Updated ' + now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

// ── HELPERS ───────────────────────────────────────────────────────────────
function getTierClass(tier) {
  if (!tier) return 'monitor';
  const t = tier.toLowerCase();
  if (t === 'strong buy') return 'strong-buy';
  if (t === 'buy candidate') return 'buy-candidate';
  if (t === 'watchlist') return 'watchlist';
  return 'monitor';
}

function showLoading(text = 'Loading...') {
  document.getElementById('loadingText').textContent = text;
  document.getElementById('loadingOverlay').classList.add('visible');
}

function hideLoading() {
  document.getElementById('loadingOverlay').classList.remove('visible');
}

function showToast(msg, type = '') {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast visible ' + type;
  setTimeout(() => toast.classList.remove('visible'), 3000);
}

function renderError() {
  document.getElementById('playerList').innerHTML = `
    <div class="empty-state">
      <div class="empty-icon">⚠️</div>
      <div class="empty-title">Connection Error</div>
      <div class="empty-text">Could not reach Google Sheets. Check your internet connection and try refreshing.</div>
    </div>
  `;
}

// Close modal on overlay click
document.getElementById('sourceModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
</script>
</body>
</html>
